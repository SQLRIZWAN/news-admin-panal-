<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>KWT News — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.6/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050c18;
  --surface:#0c1527;
  --surface2:#111e35;
  --border:#1a2d4a;
  --border2:#243a59;
  --accent:#F5A623;
  --accent2:#ffb830;
  --text:#e8edf5;
  --muted:#8899b4;
  --dim:#3a4f6a;
  --danger:#f87171;
  --success:#34d399;
  --info:#60a5fa;
}
html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body{padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}

.fade-up{animation:fadeUp .3s ease forwards}
.fade-in{animation:fadeIn .2s ease forwards}
.slide-up{animation:slideUp .35s cubic-bezier(.16,1,.3,1) forwards}
.scale-in{animation:scaleIn .2s ease forwards}
.pulse{animation:pulse 2s ease infinite}
.spinner{width:22px;height:22px;border:2.5px solid rgba(245,166,35,.25);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.shimmer{animation:shimmer 1.5s infinite linear;background:linear-gradient(90deg,var(--surface) 4%,var(--surface2) 25%,var(--surface) 36%);background-size:600px 100%}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px}

/* Inputs */
.inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;padding:12px 14px;width:100%;outline:none;transition:border .15s,box-shadow .15s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,166,35,.1)}
.inp::placeholder{color:var(--dim)}
select.inp option{background:#0c1527}
textarea.inp{resize:vertical;min-height:88px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .15s;outline:none}
.btn:active{transform:scale(.97)}
.btn-accent{background:var(--accent);color:#050c18;padding:11px 20px}
.btn-accent:hover{background:var(--accent2);box-shadow:0 4px 20px rgba(245,166,35,.3)}
.btn-accent:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);padding:9px 16px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:rgba(248,113,113,.1);color:var(--danger);border:1.5px solid rgba(248,113,113,.2);padding:8px 12px}
.btn-red:hover{background:rgba(248,113,113,.2)}
.btn-icon{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);padding:8px;border-radius:8px}
.btn-icon:hover{border-color:var(--border2);color:var(--text)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.03em}

/* Toggle */
.tog{position:relative;width:42px;height:24px;border-radius:12px;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.tog-thumb{position:absolute;top:4px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,12,24,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex:1;padding:10px 4px 8px;cursor:pointer;border:none;background:transparent;color:var(--dim);transition:color .15s;font-size:9px;font-weight:600;font-family:'Outfit',sans-serif;letter-spacing:.03em}
.bnav-item.active{color:var(--accent)}
.bnav-item .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:1px;opacity:0;transition:opacity .15s}
.bnav-item.active .dot{opacity:1}

/* Desktop sidebar */
.sidebar{position:fixed;top:0;left:0;height:100vh;width:232px;background:var(--surface);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column;overflow:hidden}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:'Outfit',sans-serif}
.nav-btn:hover{background:rgba(245,166,35,.07);color:var(--text)}
.nav-btn.active{background:rgba(245,166,35,.12);color:var(--accent);font-weight:700}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;overflow:hidden}
@media(min-width:600px){
  .modal-bg{align-items:center;padding:16px}
}
.modal{background:var(--surface);border:1px solid var(--border);width:100%;max-width:580px;max-height:92vh;overflow-y:auto;overflow-x:hidden;border-radius:20px 20px 0 0;position:relative}
@media(min-width:600px){.modal{border-radius:20px;max-height:88vh}}
body.modal-open{overflow:hidden;position:fixed;width:100%}

/* Modal grid responsive */
.modal-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:420px){.modal-grid-2{grid-template-columns:1fr}}

/* Row */
.row:hover{background:rgba(255,255,255,.02)}

/* Stat card */
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px}

/* Main layout */
@media(min-width:768px){
  .main-wrap{margin-left:232px}
  .bnav{display:none}
  body{padding-bottom:0}
}
@media(max-width:767px){
  .sidebar{display:none}
  .main-wrap{margin-left:0;padding-bottom:72px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const { createRoot } = ReactDOM;

// ── Firebase ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:"AIzaSyDLRqQ8WRohNDWz_6UgafI7Kn2f8U0KL3c",
  authDomain:"kwt-news.firebaseapp.com",
  databaseURL:"https://kwt-news-default-rtdb.firebaseio.com",
  projectId:"kwt-news",
  storageBucket:"kwt-news.firebasestorage.app",
  messagingSenderId:"604704031845",
  appId:"1:604704031845:web:b835af9ab1872ddd1d728c",
  measurementId:"G-J161YE3FDP"
};
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
try{ db.settings({experimentalForceLongPolling:true,merge:true}); }catch(e){}

const CLOUDINARY = { cloudName:'debp1kjtm', uploadPreset:'sql_admin', folder:'sql_users', uploadUrl:'https://api.cloudinary.com/v1_1/debp1kjtm/image/upload' };
const AD_POSITIONS = ['top_banner','in_feed','sidebar_top','sidebar_bottom','footer'];

// ── Helpers ────────────────────────────────────────────────────
const fmt = n=>(n||0).toLocaleString();
const timeAgo = d=>{
  if(!d)return'—';
  const s=Math.floor((Date.now()-(d instanceof Date?d:d.toDate?.()||new Date(d)))/1000);
  if(s<60)return'Just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
};
const fmtDate=d=>{
  if(!d)return'—';
  const dt=d instanceof Date?d:d.toDate?.()||new Date(d);
  return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
};
const posLabel=p=>({top_banner:'Top Banner',in_feed:'In Feed',sidebar_top:'Sidebar Top',sidebar_bottom:'Sidebar Bottom',footer:'Footer'}[p]||p);
const ctr=a=>a.impressions?(((a.clicks||0)/a.impressions)*100).toFixed(1)+'%':'0%';

// ── SVG Icons ─────────────────────────────────────────────────
const Ic = ({n,s=18,c='currentColor'}) => {
  const p = {
    grid:<><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>,
    news:<><path d="M4 6h16M4 10h16M4 14h10"/><rect x="2" y="3" width="20" height="18" rx="2"/></>,
    ads:<><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></>,
    chat:<><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>,
    users:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    bell:<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
    cog:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
    out:<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
    search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    eye:<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
    eyeoff:<><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>,
    send:<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
    upload:<><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></>,
    x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    ban:<><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></>,
    ok:<><polyline points="20 6 9 17 4 12"/></>,
    warn:<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    img:<><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
    star:<><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>,
    refresh:<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.08-8.07"/></>,
  };
  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p[n]}</svg>;
};

// ── Toast ──────────────────────────────────────────────────────
const useToast = () => {
  const [list,setList] = useState([]);
  const add = useCallback((msg,type='ok')=>{
    const id=Date.now();
    setList(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setList(p=>p.filter(t=>t.id!==id)),3200);
  },[]);
  const Toast = ()=>(
    <div style={{position:'fixed',bottom:80,right:16,zIndex:999,display:'flex',flexDirection:'column',gap:8}}>
      {list.map(t=>(
        <div key={t.id} className="fade-up" style={{padding:'11px 16px',borderRadius:12,fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:10,boxShadow:'0 8px 32px rgba(0,0,0,.5)',background:t.type==='ok'?'#065f46':t.type==='error'?'#7f1d1d':'#1e3a5f',border:`1px solid ${t.type==='ok'?'#34d399':t.type==='error'?'#f87171':'#60a5fa'}`,color:'#fff',minWidth:200,maxWidth:280}}>
          <Ic n={t.type==='ok'?'ok':t.type==='error'?'x':'bell'} s={14}/>
          {t.msg}
        </div>
      ))}
    </div>
  );
  return {add,Toast};
};

// ── Confirm ────────────────────────────────────────────────────
const Confirm = ({msg,onYes,onNo}) => (
  <div className="modal-bg scale-in" onClick={onNo}>
    <div className="card" style={{width:'100%',maxWidth:360,padding:24,margin:16,borderRadius:16}} onClick={e=>e.stopPropagation()}>
      <div style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:20}}>
        <div style={{width:40,height:40,borderRadius:12,background:'rgba(248,113,113,.1)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <Ic n="warn" s={18} c="var(--danger)"/>
        </div>
        <div>
          <p style={{fontWeight:700,fontSize:15,marginBottom:4}}>Confirm Delete</p>
          <p style={{color:'var(--muted)',fontSize:13,lineHeight:1.5}}>{msg}</p>
        </div>
      </div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <button className="btn btn-ghost" onClick={onNo}>Cancel</button>
        <button className="btn btn-red" style={{fontWeight:700,padding:'9px 18px'}} onClick={onYes}>Delete</button>
      </div>
    </div>
  </div>
);

// ── Image Upload ───────────────────────────────────────────────
const ImgUpload = ({value,onChange,label='Image'}) => {
  const [busy,setBusy] = useState(false);
  const ref = useRef();
  const upload = async file => {
    if(!file)return; setBusy(true);
    try{
      const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',CLOUDINARY.uploadPreset); fd.append('folder',CLOUDINARY.folder);
      const r=await fetch(CLOUDINARY.uploadUrl,{method:'POST',body:fd});
      onChange((await r.json()).secure_url);
    }catch(e){console.error(e);}finally{setBusy(false);}
  };
  return (
    <div>
      {label&&<p style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.06em',marginBottom:8}}>{label.toUpperCase()}</p>}
      <div style={{border:`2px dashed ${value?'var(--success)':'var(--border2)'}`,borderRadius:12,padding:16,cursor:'pointer',background:'var(--surface2)',transition:'border .2s'}}
        onClick={()=>ref.current?.click()}
        onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--accent)'}}
        onDragLeave={e=>{e.currentTarget.style.borderColor=value?'var(--success)':'var(--border2)'}}
        onDrop={e=>{e.preventDefault();upload(e.dataTransfer.files[0]);}}>
        <input ref={ref} type="file" accept="image/*,video/*" style={{display:'none'}} onChange={e=>upload(e.target.files[0])}/>
        {busy?(
          <div style={{textAlign:'center',padding:'8px 0'}}>
            <div className="spinner" style={{margin:'0 auto 8px'}}></div>
            <p style={{fontSize:12,color:'var(--muted)'}}>Uploading…</p>
          </div>
        ):value?(
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <img src={value} style={{width:56,height:44,objectFit:'cover',borderRadius:8,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:12,color:'var(--success)',fontWeight:600,marginBottom:2}}>✓ Uploaded</p>
              <p style={{fontSize:11,color:'var(--dim)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{value.split('/').pop()}</p>
            </div>
            <button onClick={e=>{e.stopPropagation();onChange('');}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--danger)'}}>
              <Ic n="x" s={14}/>
            </button>
          </div>
        ):(
          <div style={{textAlign:'center',padding:'8px 0'}}>
            <Ic n="upload" s={22} c="var(--dim)"/>
            <p style={{fontSize:13,color:'var(--muted)',marginTop:8}}>Tap or drag to upload</p>
            <p style={{fontSize:11,color:'var(--dim)',marginTop:2}}>Images & videos</p>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Field ──────────────────────────────────────────────────────
const Field = ({label,children,required})=>(
  <div>
    <p style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.06em',marginBottom:8}}>
      {label.toUpperCase()}{required&&<span style={{color:'var(--accent)',marginLeft:4}}>*</span>}
    </p>
    {children}
  </div>
);

// ── LOGIN PAGE ─────────────────────────────────────────────────
const Login = ({onLogin}) => {
  const [email,setEmail] = useState('');
  const [pass,setPass] = useState('');
  const [err,setErr] = useState('');
  const [busy,setBusy] = useState(false);

  const submit = async e => {
    e.preventDefault(); setErr(''); setBusy(true);
    try{
      const c=await auth.signInWithEmailAndPassword(email,pass);
      onLogin(c.user);
    }catch(e){setErr('Incorrect email or password');}
    finally{setBusy(false);}
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 16px',background:'radial-gradient(ellipse at 30% 40%, #0d2040 0%, var(--bg) 65%)'}}>
      <div style={{width:'100%',maxWidth:380}} className="fade-up">
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:64,height:64,borderRadius:20,background:'var(--accent)',marginBottom:16,boxShadow:'0 8px 32px rgba(245,166,35,.35)'}}>
            <span style={{fontFamily:'Outfit',fontWeight:900,fontSize:18,color:'#050c18',letterSpacing:'-.02em'}}>KWT</span>
          </div>

// ── NEWS MANAGER ───────────────────────────────────────────────
const BLANK = {title:'',summary:'',content:'',imageUrl:'',category:'kuwait',source:'KWT News',sourceLogo:'',readTime:'3 min read',isBreaking:false,mediaType:'image'};
const NewsManager = ({toast}) => {
  const [news,setNews] = useState([]);
  const [loading,setLoading] = useState(true);
  const [modal,setModal] = useState(false);
  const [editing,setEditing] = useState(null);
  const [form,setForm] = useState(BLANK);
  const [saving,setSaving] = useState(false);
  const [confirm,setConfirm] = useState(null);
  const [search,setSearch] = useState('');
  const [cat,setCat] = useState('all');
  const [visFilter,setVisFilter] = useState('visible'); // 'visible' | 'hidden' | 'all'

  useEffect(()=>{
    const u=db.collection('news').orderBy('timestamp','desc').limit(50).onSnapshot(s=>{
      setNews(s.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);
    });
    return ()=>u();
  },[]);

  const openAdd=()=>{setEditing(null);setForm(BLANK);setModal(true);};
  const openEdit=n=>{setEditing(n.id);setForm({...BLANK,...n});setModal(true);};
  const close=()=>{setModal(false);setEditing(null);setForm(BLANK);};

  // Lock body scroll when modal open
  useEffect(()=>{
    if(modal){document.body.classList.add('modal-open');}
    else{document.body.classList.remove('modal-open');}
    return()=>document.body.classList.remove('modal-open');
  },[modal]);

  const save=async()=>{
    if(!form.title.trim()||!form.summary.trim()){toast.add('Title & summary required','error');return;}
    setSaving(true);
    try{
      const d={...form,timestamp:firebase.firestore.FieldValue.serverTimestamp()};
      if(editing){await db.collection('news').doc(editing).update(d);toast.add('Updated!');}
      else{await db.collection('news').add(d);toast.add('Published!');}
      close();
    }catch(e){toast.add(e.message,'error');}
    finally{setSaving(false);}
  };

  const del=async id=>{
    try{await db.collection('news').doc(id).delete();toast.add('Deleted');}
    catch(e){toast.add(e.message,'error');}
    setConfirm(null);
  };

  const toggleBreaking=async(id,val)=>{
    await db.collection('news').doc(id).update({isBreaking:!val});
    toast.add(!val?'Marked Breaking!':'Removed Breaking');
  };

  const toggleHidden=async(id,val)=>{
    await db.collection('news').doc(id).update({hidden:!val});
    toast.add(!val?'News hidden':'News visible again');
  };

  const filtered=useMemo(()=>news.filter(n=>{
    const q=search.toLowerCase();
    const matchQ=!q||n.title?.toLowerCase().includes(q);
    const matchC=cat==='all'||n.category===cat;
    const matchV=visFilter==='all'||(visFilter==='hidden'?n.hidden===true:!n.hidden);
    return matchQ&&matchC&&matchV;
  }),[news,search,cat,visFilter]);

  const F=p=>setForm(prev=>({...prev,...p}));

  return (
    <div className="fade-up">
      {confirm&&<Confirm msg={`Delete "${confirm.title}"?`} onYes={()=>del(confirm.id)} onNo={()=>setConfirm(null)}/>}

      {modal&&(
        <div className="modal-bg" onClick={close}>
          <div className="modal slide-up" onClick={e=>e.stopPropagation()}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:'var(--surface)',zIndex:10}}>
              <div>
                <h3 style={{fontWeight:800,fontSize:17}}>{editing?'Edit News':'New Article'}</h3>
                <p style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{editing?'Update article details':'Fill in the article details'}</p>
              </div>
              <button className="btn btn-ghost" style={{padding:'8px'}} onClick={close}><Ic n="x" s={16}/></button>
            </div>
            <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:14}}>
              <Field label="Title" required>
                <input className="inp" value={form.title} onChange={e=>F({title:e.target.value})} placeholder="News headline…"/>
              </Field>
              <Field label="Summary" required>
                <textarea className="inp" value={form.summary} onChange={e=>F({summary:e.target.value})} placeholder="Short description…" style={{minHeight:80}}/>
              </Field>
              <Field label="Content">
                <textarea className="inp" value={form.content} onChange={e=>F({content:e.target.value})} placeholder="Full article content…" style={{minHeight:120}}/>
              </Field>
              <div className="modal-grid-2">
                <Field label="Category">
                  <select className="inp" value={form.category} onChange={e=>F({category:e.target.value})}>
                    <option value="kuwait">🇰🇼 Kuwait</option>
                    <option value="world">🌍 World</option>
                    <option value="all">📰 All</option>
                  </select>
                </Field>
                <Field label="Media Type">
                  <select className="inp" value={form.mediaType} onChange={e=>F({mediaType:e.target.value})}>
                    <option value="image">🖼 Image</option>
                    <option value="video">🎬 Video</option>
                  </select>
                </Field>
              </div>
              <div className="modal-grid-2">
                <Field label="Source Name">
                  <input className="inp" value={form.source} onChange={e=>F({source:e.target.value})} placeholder="KWT News"/>
                </Field>
                <Field label="Read Time">
                  <input className="inp" value={form.readTime} onChange={e=>F({readTime:e.target.value})} placeholder="3 min read"/>
                </Field>
              </div>
              <ImgUpload value={form.imageUrl} onChange={v=>F({imageUrl:v})} label="Article Image"/>
              <ImgUpload value={form.sourceLogo} onChange={v=>F({sourceLogo:v})} label="Source Logo"/>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.15)',borderRadius:12}}>
                <div>
                  <p style={{fontSize:13,fontWeight:700,color:'var(--danger)'}}>Breaking News</p>
                  <p style={{fontSize:11,color:'var(--dim)',marginTop:1}}>Pin to top of feed</p>
                </div>
                <button className="tog" style={{background:form.isBreaking?'var(--danger)':'var(--border2)'}} onClick={()=>F({isBreaking:!form.isBreaking})}>
                  <div className="tog-thumb" style={{left:form.isBreaking?'22px':'4px'}}></div>
                </button>
              </div>
            </div>
            <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',display:'flex',gap:10,justifyContent:'flex-end',position:'sticky',bottom:0,background:'var(--surface)'}}>
              <button className="btn btn-ghost" onClick={close}>Cancel</button>
              <button className="btn btn-accent" onClick={save} disabled={saving} style={{minWidth:120}}>
                {saving?<span className="spinner" style={{width:16,height:16}}></span>:(editing?'Update':'Publish')}
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <h1 style={{fontFamily:'Outfit',fontSize:24,fontWeight:800,letterSpacing:'-.02em'}}>News</h1>
          <p style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{news.length} articles</p>
        </div>
        <button className="btn btn-accent" style={{padding:'10px 16px',gap:6}} onClick={openAdd}>
          <Ic n="plus" s={15}/> Add
        </button>
      </div>

      {/* Search + filter */}
      <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}>
            <Ic n="search" s={15} c="var(--dim)"/>
          </div>
          <input className="inp" placeholder="Search articles…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:40}}/>
        </div>
        <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:2}}>
          {['all','kuwait','world'].map(c=>(
            <button key={c} onClick={()=>setCat(c)} style={{padding:'7px 14px',borderRadius:8,fontSize:12,fontWeight:600,border:'1px solid',cursor:'pointer',transition:'all .15s',whiteSpace:'nowrap',background:cat===c?'var(--accent)':'transparent',color:cat===c?'#050c18':'var(--muted)',borderColor:cat===c?'var(--accent)':'var(--border)'}}>
              {c==='all'?'All':c==='kuwait'?'🇰🇼 Kuwait':'🌍 World'}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:2}}>
          {[
            {v:'visible',label:'👁 Visible',cnt:news.filter(n=>!n.hidden).length},
            {v:'hidden', label:'🚫 Hidden', cnt:news.filter(n=>n.hidden).length},
            {v:'all',    label:'All',       cnt:news.length},
          ].map(({v,label,cnt})=>(
            <button key={v} onClick={()=>setVisFilter(v)} style={{padding:'7px 14px',borderRadius:8,fontSize:12,fontWeight:600,border:'1px solid',cursor:'pointer',transition:'all .15s',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:5,background:visFilter===v?(v==='hidden'?'rgba(248,113,113,.15)':'var(--accent)'):'transparent',color:visFilter===v?(v==='hidden'?'var(--danger)':'#050c18'):'var(--muted)',borderColor:visFilter===v?(v==='hidden'?'var(--danger)':'var(--accent)'):'var(--border)'}}>
              {label}
              <span style={{background:'rgba(255,255,255,.12)',borderRadius:999,padding:'1px 7px',fontSize:10,fontWeight:700}}>{cnt}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="card">
        {loading?[1,2,3].map(i=>(
          <div key={i} style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',gap:12}}>
            <div className="shimmer" style={{width:48,height:48,borderRadius:10,flexShrink:0}}></div>
            <div style={{flex:1}}>
              <div className="shimmer" style={{height:13,borderRadius:6,width:'65%',marginBottom:8}}></div>
              <div className="shimmer" style={{height:10,borderRadius:6,width:'35%'}}></div>
            </div>
          </div>
        )):filtered.length===0?(
          <div style={{padding:48,textAlign:'center',color:'var(--dim)'}}>
            <Ic n="news" s={28} c="var(--border2)"/>
            <p style={{marginTop:12,fontSize:13}}>No articles found</p>
          </div>
        ):filtered.map(n=>(
          <div key={n.id} className="row" style={{padding:'13px 16px',borderBottom:'1px solid rgba(26,45,74,.5)',display:'flex',alignItems:'center',gap:12,opacity:n.hidden?0.5:1,transition:'opacity .2s'}}>
            <div style={{width:48,height:48,borderRadius:10,background:'var(--surface2)',overflow:'hidden',flexShrink:0,position:'relative'}}>
              {n.imageUrl&&<img src={n.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover',filter:n.hidden?'grayscale(1)':''}} loading="lazy"/>}
              {n.hidden&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="eyeoff" s={14} c="#fff"/></div>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:3}}>{n.title||'Untitled'}</p>
              <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:11,color:'var(--dim)'}}>{timeAgo(n.timestamp)}</span>
                {n.isBreaking&&<span className="badge" style={{background:'rgba(248,113,113,.1)',color:'var(--danger)',border:'1px solid rgba(248,113,113,.2)',fontSize:9}}>BREAKING</span>}
                {n.hidden&&<span className="badge" style={{background:'rgba(100,116,139,.1)',color:'var(--muted)',border:'1px solid rgba(100,116,139,.2)',fontSize:9}}>HIDDEN</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:5,flexShrink:0,alignItems:'center'}}>
              {/* Breaking toggle */}
              <button className="tog" style={{background:n.isBreaking?'var(--danger)':'var(--border2)'}} title="Breaking" onClick={()=>toggleBreaking(n.id,n.isBreaking)}>
                <div className="tog-thumb" style={{left:n.isBreaking?'22px':'4px'}}></div>
              </button>
              {/* Hide / Unhide */}
              <button
                className="btn btn-icon"
                title={n.hidden?'Unhide':'Hide'}
                style={{background:n.hidden?'rgba(245,166,35,.12)':'var(--surface2)',borderColor:n.hidden?'rgba(245,166,35,.35)':'var(--border)',color:n.hidden?'var(--accent)':'var(--muted)'}}
                onClick={()=>toggleHidden(n.id,!!n.hidden)}
              >
                <Ic n={n.hidden?'eye':'eyeoff'} s={14}/>
              </button>
              {/* Edit */}
              <button className="btn btn-icon" title="Edit" onClick={()=>openEdit(n)}><Ic n="edit" s={14}/></button>
              {/* Delete */}
              <button className="btn btn-red" title="Delete" onClick={()=>setConfirm(n)}><Ic n="trash" s={14}/></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── PUSH NOTIFICATIONS ────────────────────────────────────────
const PushNotifs = ({toast}) => {
  const [title,setTitle] = useState('');
  const [body,setBody] = useState('');
  const [sending,setSending] = useState(false);
  const [serverKey,setServerKey] = useState(()=>{ try{return localStorage.getItem('fcm_sk')||'';}catch(e){return '';} });
  const [tokenCount,setTokenCount] = useState(0);
  const [history,setHistory] = useState([]);
  const [showKey,setShowKey] = useState(false);

  useEffect(()=>{
    db.collection('fcm_tokens').get().then(s=>setTokenCount(s.size));
    db.collection('notification_history').orderBy('sentAt','desc').limit(10).onSnapshot(s=>{
      setHistory(s.docs.map(d=>({id:d.id,...d.data()})));
    });
  },[]);

  const saveKey=()=>{ try{localStorage.setItem('fcm_sk',serverKey);}catch(e){} toast.add('Key saved'); };

  const send=async()=>{
    if(!title.trim()||!body.trim()){toast.add('Title and message required','error');return;}
    setSending(true);
    try{
      const snap=await db.collection('fcm_tokens').get();
      const tokens=snap.docs.map(d=>d.data().token).filter(Boolean);
      if(!tokens.length){toast.add('No subscribers','error');setSending(false);return;}
      await db.collection('notification_history').add({title,body,sentAt:firebase.firestore.FieldValue.serverTimestamp(),tokenCount:tokens.length,status:'sent'});
      if(serverKey){
        const batches=[];
        for(let i=0;i<tokens.length;i+=1000) batches.push(tokens.slice(i,i+1000));
        await Promise.all(batches.map(batch=>fetch('https://fcm.googleapis.com/fcm/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'key='+serverKey},body:JSON.stringify({registration_ids:batch,notification:{title,body},android:{priority:'high'},apns:{headers:{'apns-priority':'10'}}})})));
      }
      toast.add(`Sent to ${tokens.length} subscribers!`);
      setTitle(''); setBody('');
    }catch(e){toast.add(e.message,'error');}
    finally{setSending(false);}
  };

  return (
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <h1 style={{fontFamily:'Outfit',fontSize:24,fontWeight:800,letterSpacing:'-.02em'}}>Push Alerts</h1>
        <p style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{fmt(tokenCount)} subscribers</p>
      </div>

      {/* Compose */}
      <div className="card" style={{padding:20,marginBottom:16}}>
        <p style={{fontWeight:700,fontSize:14,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
          <Ic n="send" s={15} c="var(--accent)"/> Compose Alert
        </p>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Field label="Title" required>
            <input className="inp" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Breaking: …"/>
          </Field>
          <Field label="Message" required>
            <textarea className="inp" value={body} onChange={e=>setBody(e.target.value)} placeholder="Alert message…" style={{minHeight:100}}/>
          </Field>
          {title&&body&&(
            <div style={{padding:14,background:'var(--surface2)',borderRadius:12,border:'1px solid var(--border)'}}>
              <p style={{fontSize:10,fontWeight:700,color:'var(--dim)',letterSpacing:'.06em',marginBottom:10}}>PREVIEW</p>
              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <div style={{width:32,height:32,borderRadius:8,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:10,fontWeight:900,color:'#050c18'}}>KWT</span>
                </div>
                <div>
                  <p style={{fontSize:13,fontWeight:700,marginBottom:2}}>{title}</p>
                  <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.4}}>{body}</p>
                </div>
              </div>
            </div>
          )}
          <button className="btn btn-accent" style={{width:'100%',padding:'13px',fontSize:14}} onClick={send} disabled={sending||!title||!body}>
            {sending?<><span className="spinner" style={{width:16,height:16}}></span> Sending…</>:<><Ic n="send" s={15}/>Send to {fmt(tokenCount)} Subscribers</>}
          </button>
        </div>
      </div>

      {/* FCM key */}
      <div className="card" style={{padding:20,marginBottom:16}}>
        <p style={{fontWeight:700,fontSize:14,marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
          <Ic n="cog" s={15} c="var(--muted)"/> FCM Server Key
        </p>
        <p style={{fontSize:12,color:'var(--muted)',marginBottom:14,lineHeight:1.6}}>Firebase Console → Project Settings → Cloud Messaging → Legacy server key</p>
        <div style={{display:'flex',gap:8}}>
          <input className="inp" type={showKey?'text':'password'} value={serverKey} onChange={e=>setServerKey(e.target.value)} placeholder="AAAAxxx…" style={{flex:1}}/>
          <button className="btn btn-ghost" style={{padding:'10px 12px',flexShrink:0}} onClick={()=>setShowKey(v=>!v)}><Ic n="eye" s={14}/></button>
          <button className="btn btn-ghost" style={{padding:'10px 14px',flexShrink:0}} onClick={saveKey}>Save</button>
        </div>
        {serverKey&&<p style={{fontSize:11,color:'var(--success)',marginTop:8}}>✓ Saved locally</p>}
      </div>

      {/* History */}
      <div className="card" style={{padding:20}}>
        <p style={{fontWeight:700,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
          <Ic n="refresh" s={15} c="var(--muted)"/> History
        </p>
        {history.length===0?(
          <p style={{fontSize:13,color:'var(--dim)',textAlign:'center',padding:'12px 0'}}>No notifications sent yet</p>
        ):history.map(h=>(
          <div key={h.id} style={{padding:'11px 0',borderBottom:'1px solid var(--border)',display:'flex',gap:10,alignItems:'flex-start'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'var(--success)',marginTop:5,flexShrink:0}}></div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:13,fontWeight:600,marginBottom:2}}>{h.title}</p>
              <p style={{fontSize:11,color:'var(--dim)'}}>{timeAgo(h.sentAt)} · {fmt(h.tokenCount)} devices</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

      <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:14}}>
        {[['Project','KWT News'],['Firebase','kwt-news'],['Version','2.0.0'],['Build','2026']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:13,color:'var(--muted)'}}>{k}</span>
            <span style={{fontSize:13,fontWeight:600,fontFamily:'DM Mono,monospace'}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  </div>
);

// ── PAGES CONFIG ──────────────────────────────────────────────
const PAGES = [
  {id:'dashboard',label:'Home',icon:'grid'},
  {id:'news',label:'News',icon:'news'},
  {id:'ads',label:'Ads',icon:'ads'},
  {id:'comments',label:'Comments',icon:'chat'},
  {id:'users',label:'Users',icon:'users'},
  {id:'notifications',label:'Alerts',icon:'bell'},
  {id:'settings',label:'Settings',icon:'cog'},
];

// ── ADMIN LAYOUT ──────────────────────────────────────────────
const Layout = ({user,onLogout}) => {
  const [page,setPage] = useState('dashboard');
  const toast = useToast();
  const pg = PAGES.find(p=>p.id===page)||PAGES[0];

  // Bottom nav pages (5 visible, rest in settings)
  const bottomPages = PAGES.slice(0,5);

  const renderPage = () => {
    const p={toast};
    switch(page){
      case 'dashboard': return <Dashboard/>;
      case 'news': return <NewsManager {...p}/>;
      case 'ads': return <AdsManager {...p}/>;
      case 'comments': return <CommentsManager {...p}/>;
      case 'users': return <UsersManager {...p}/>;
      case 'notifications': return <PushNotifs {...p}/>;
      case 'settings': return <SettingsPage user={user} {...p}/>;
      default: return <Dashboard/>;
    }
  };

  return (
    <div>
      {/* Desktop Sidebar */}
      <aside className="sidebar">
        <div style={{padding:'18px 16px 14px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{fontFamily:'Outfit',fontWeight:900,fontSize:12,color:'#050c18'}}>KWT</span>
            </div>
            <div>
              <p style={{fontFamily:'Outfit',fontWeight:800,fontSize:14,lineHeight:1}}>KWT News</p>
              <p style={{fontSize:10,color:'var(--dim)',marginTop:2}}>Admin Panel</p>
            </div>
          </div>
        </div>
        <nav style={{padding:'10px 8px',flex:1,overflowY:'auto'}}>
          {PAGES.map(p=>(
            <button key={p.id} className={`nav-btn ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
              <Ic n={p.icon} s={15}/>
              {p.label}
              {page===p.id&&<div style={{marginLeft:'auto',width:5,height:5,borderRadius:'50%',background:'var(--accent)'}}></div>}
            </button>
          ))}
        </nav>
        <div style={{padding:'10px 8px',borderTop:'1px solid var(--border)',flexShrink:0}}>
          <div style={{padding:'10px 12px',borderRadius:10,display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
            <img src={user.photoURL||`https://ui-avatars.com/api/?name=A&background=F5A623&color=050c18`} style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',border:'1.5px solid var(--border2)',flexShrink:0}}/>
            <div style={{minWidth:0,flex:1}}>
              <p style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.displayName||'Admin'}</p>
              <p style={{fontSize:10,color:'var(--dim)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</p>
            </div>
          </div>
          <button className="nav-btn" style={{color:'var(--danger)'}} onClick={onLogout}>
            <Ic n="out" s={14} c="var(--danger)"/> Sign Out
          </button>
        </div>
      </aside>

      {/* Main content */}
      <div className="main-wrap">
        {/* Top bar */}
        <div style={{position:'sticky',top:0,background:'rgba(5,12,24,.92)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:'1px solid var(--border)',padding:'0 16px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',zIndex:30,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {/* Mobile logo */}
            <div style={{display:'flex',alignItems:'center',gap:8}} className="mobile-logo">
              <div style={{width:28,height:28,borderRadius:8,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontFamily:'Outfit',fontWeight:900,fontSize:10,color:'#050c18'}}>K</span>
              </div>
              <span style={{fontFamily:'Outfit',fontWeight:700,fontSize:15}}>{pg.label}</span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:999,background:'rgba(52,211,153,.07)',border:'1px solid rgba(52,211,153,.18)'}}>
              <div className="pulse" style={{width:5,height:5,borderRadius:'50%',background:'var(--success)'}}></div>
              <span style={{fontSize:10,color:'var(--success)',fontWeight:700,letterSpacing:'.04em'}}>LIVE</span>
            </div>
            {/* Mobile logout */}
            <button className="btn btn-ghost" style={{padding:'7px 10px',fontSize:12,display:'none'}} onClick={onLogout} id="mob-logout">
              <Ic n="out" s={14}/>
            </button>
          </div>
        </div>
        <style>{`@media(max-width:767px){#mob-logout{display:inline-flex!important}}`}</style>

        {/* Page content */}
        <div style={{padding:'20px 16px 24px',maxWidth:900,margin:'0 auto'}}>
          {renderPage()}
        </div>
      </div>

      {/* Bottom Nav (mobile) */}
      <nav className="bnav">
        <div style={{display:'flex',alignItems:'stretch'}}>
          {bottomPages.map(p=>(
            <button key={p.id} className={`bnav-item ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
              <Ic n={p.icon} s={20}/>
              <span>{p.label}</span>
              <div className="dot"></div>
            </button>
          ))}
          {/* More button → settings */}
          <button className={`bnav-item ${page==='settings'||page==='notifications'?'active':''}`} onClick={()=>setPage('notifications')}>
            <Ic n="bell" s={20}/>
            <span>Alerts</span>
            <div className="dot"></div>
          </button>
        </div>
      </nav>

      <toast.Toast/>
    </div>
  );
};

// ── ROOT APP ──────────────────────────────────────────────────
const App = () => {
  const [user,setUser] = useState(null);
  const [checking,setChecking] = useState(true);

  useEffect(()=>{
    const u=auth.onAuthStateChanged(u=>{
      setUser(u||null); setChecking(false);
    });
    return ()=>u();
  },[]);

  const logout=()=>{ auth.signOut(); setUser(null); };

  if(checking) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{width:48,height:48,borderRadius:14,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 32px rgba(245,166,35,.3)'}}>
        <span style={{fontFamily:'Outfit',fontWeight:900,fontSize:13,color:'#050c18'}}>KWT</span>
      </div>
      <div className="spinner"></div>
    </div>
  );

  if(!user) return <Login onLogin={setUser}/>;
  return <Layout user={user} onLogout={logout}/>;
};

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
  </html>
