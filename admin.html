<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050c18;
  --surface:#0c1527;
  --surface2:#111e35;
  --border:#1a2d4a;
  --border2:#243a59;
  --accent:#F5A623;
  --accent2:#ffb830;
  --text:#e8edf5;
  --muted:#8899b4;
  --dim:#3a4f6a;
  --danger:#f87171;
  --success:#34d399;
  --info:#60a5fa;
}
html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body{padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}

.fade-up{animation:fadeUp .3s ease forwards}
.fade-in{animation:fadeIn .2s ease forwards}
.slide-up{animation:slideUp .35s cubic-bezier(.16,1,.3,1) forwards}
.scale-in{animation:scaleIn .2s ease forwards}
.pulse{animation:pulse 2s ease infinite}
.spinner{width:22px;height:22px;border:2.5px solid rgba(245,166,35,.25);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.shimmer{animation:shimmer 1.5s infinite linear;background:linear-gradient(90deg,var(--surface) 4%,var(--surface2) 25%,var(--surface) 36%);background-size:600px 100%}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px}

/* Inputs */
.inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;padding:12px 14px;width:100%;outline:none;transition:border .15s,box-shadow .15s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,166,35,.1)}
.inp::placeholder{color:var(--dim)}
select.inp option{background:#0c1527}
textarea.inp{resize:vertical;min-height:88px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .15s;outline:none}
.btn:active{transform:scale(.97)}
.btn-accent{background:var(--accent);color:#050c18;padding:11px 20px}
.btn-accent:hover{background:var(--accent2);box-shadow:0 4px 20px rgba(245,166,35,.3)}
.btn-accent:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);padding:9px 16px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:rgba(248,113,113,.1);color:var(--danger);border:1.5px solid rgba(248,113,113,.2);padding:8px 12px}
.btn-red:hover{background:rgba(248,113,113,.2)}
.btn-icon{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);padding:8px;border-radius:8px}
.btn-icon:hover{border-color:var(--border2);color:var(--text)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.03em}

/* Toggle */
.tog{position:relative;width:42px;height:24px;border-radius:12px;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.tog-thumb{position:absolute;top:4px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,12,24,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex:1;padding:10px 4px 8px;cursor:pointer;border:none;background:transparent;color:var(--dim);transition:color .15s;font-size:9px;font-weight:600;font-family:'Outfit',sans-serif;letter-spacing:.03em}
.bnav-item.active{color:var(--accent)}
.bnav-item .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:1px;opacity:0;transition:opacity .15s}
.bnav-item.active .dot{opacity:1}

/* Desktop sidebar */
.sidebar{position:fixed;top:0;left:0;height:100vh;width:232px;background:var(--surface);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column;overflow:hidden}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:'Outfit',sans-serif}
.nav-btn:hover{background:rgba(245,166,35,.07);color:var(--text)}
.nav-btn.active{background:rgba(245,166,35,.12);color:var(--accent);font-weight:700}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;overflow:hidden}
@media(min-width:600px){
  .modal-bg{align-items:center;padding:16px}
}
.modal{background:var(--surface);border:1px solid var(--border);width:100%;max-width:580px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;position:relative}
@media(min-width:600px){.modal{border-radius:20px;max-height:88vh}}
body.modal-open{overflow:hidden;position:fixed;width:100%}

/* Row */
.row:hover{background:rgba(255,255,255,.02)}

/* Stat card */
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px}

/* Main layout */
@media(min-width:768px){
  .main-wrap{margin-left:232px}
  .bnav{display:none}
  body{padding-bottom:0}
}
@media(max-width:767px){
  .sidebar{display:none}
  .main-wrap{margin-left:0;padding-bottom:72px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const { createRoot } = ReactDOM;

// ── Firebase ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:"AIzaSyDLRqQ8WRohNDWz_6UgafI7Kn2f8U0KL3c",
  authDomain:"kwt-news.firebaseapp.com",
  databaseURL:"https://kwt-news-default-rtdb.firebaseio.com",
  projectId:"kwt-news",

const app = firebase.initializeApp(firebaseConfig);

try{ db.settings({experimentalForceLongPolling:true,merge:true}); }catch(e){}

const CLOUDINARY = { cloudName:'debp1kjtm', uploadPreset:'sql_admin', folder:'sql_users', uploadUrl:'https://api.cloudinary.com/v1_1/debp1kjtm/auto/upload' };
const AD_POSITIONS = ['top_banner','in_feed','sidebar_top','sidebar_bottom','footer'];
const GEMINI_API_KEY = 'AIzaSyDunpdQAAEIjQXr40arN630WUJi-rK2S3Q';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
const NEWS_FEEDS = [
  { url:'https://feeds.bbci.co.uk/news/world/rss.xml', source:'BBC News', domain:'bbc.co.uk' },
  { url:'https://www.aljazeera.com/xml/rss/all.xml', source:'Al Jazeera', domain:'aljazeera.com' },

];

// ── Helpers ────────────────────────────────────────────────────
const fmt = n=>(n||0).toLocaleString();
const timeAgo = d=>{
  if(!d)return'—';
  const s=Math.floor((Date.now()-(d instanceof Date?d:d.toDate?.()||new Date(d)))/1000);
  if(s<60)return'Just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
};
const fmtDate=d=>{
  if(!d)return'—';
  const dt=d instanceof Date?d:d.toDate?.()||new Date(d);
  return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
};
const posLabel=p=>({top_banner:'Top Banner',in_feed:'In Feed',sidebar_top:'Sidebar Top',sidebar_bottom:'Sidebar Bottom',footer:'Footer'}[p]||p);
const ctr=a=>a.impressions?(((a.clicks||0)/a.impressions)*100).toFixed(1)+'%':'0%';

// ── AI News Fetcher ────────────────────────────────────────────
const fetchAndRewriteNews = async (onLog, onDone) => {
  onLog('📡 Connecting to news feeds...');
  let allItems = [];

  for (const feed of NEWS_FEEDS) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}&count=8`);
      const data = await res.json();
      if (data.status === 'ok' && data.items?.length) {
        const tagged = data.items.map(i => ({ ...i, feedSource: feed }));
        allItems = allItems.concat(tagged);
        onLog(`  ✅ ${feed.source}: ${data.items.length} articles`);
      } else { onLog(`  ⚠️ ${feed.source}: No items`); }
    } catch (e) { onLog(`  ❌ ${feed.source}: ${e.message}`); }
  }

  if (allItems.length === 0) {
    onLog('\n❌ No news fetched. Check internet connection.');
    onDone(0); return;
  }

  onLog(`\n🔍 Checking ${allItems.length} articles for duplicates...`);
  const snap = await db.collection('news').orderBy('timestamp','desc').limit(150).get();
  const existingTitles = new Set(snap.docs.map(d => (d.data().title||'').toLowerCase().trim()));

  const newItems = allItems.filter(item => {
    const t = (item.title||'').toLowerCase().trim();
    return t.length > 10 && !existingTitles.has(t);
  });
  onLog(`✨ ${newItems.length} new articles • ${allItems.length - newItems.length} duplicates skipped\n`);

  if (newItems.length === 0) { onLog('ℹ️ All articles already exist. Nothing new to add.'); onDone(0); return; }

  const toProcess = newItems.slice(0, 5);
  let saved = 0;

  for (let i = 0; i < toProcess.length; i++) {
    const item = toProcess[i];
    onLog(`[${i+1}/${toProcess.length}] 🤖 Rewriting: "${(item.title||'').substring(0,55)}..."`);

    const rawContent = (item.description || item.content || item.title || '')
      .replace(/<[^>]*>/g, '').substring(0, 600);

    const prompt = `You are a professional news editor. Rewrite this news article for KWT News.

TITLE: ${item.title}
CONTENT: ${rawContent}
SOURCE: ${item.feedSource.source} (${item.feedSource.domain})

RULES:
- New catchy title (max 10 words)
- Summary: 2 sentences, max 40 words
- Article: EXACTLY 120 words, simple English, end with "Source: ${item.feedSource.domain}"
- Category: "kuwait" if about Kuwait/Gulf/Arab region, else "world"
- Keyword: ONE word for image search (e.g. politics, economy, war, sports, technology, climate, business)

Reply ONLY with valid JSON, no markdown, no backticks:
{"title":"...","summary":"...","content":"...","category":"world","keyword":"news"}`;

    try {
      const res = await fetch(GEMINI_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.7,maxOutputTokens:600} })
      });
      if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||`HTTP ${res.status}`); }
      const gData = await res.json();
      const rawText = gData.candidates?.[0]?.content?.parts?.[0]?.text || '';

      let parsed;
      try {
        const clean = rawText.replace(/```json|```/gi,'').trim();
        parsed = JSON.parse(clean);
      } catch {
        const match = rawText.match(/\{[\s\S]*?\}/);
        if (!match) throw new Error('Gemini returned invalid JSON');
        parsed = JSON.parse(match[0]);
      }

      if (!parsed.title || !parsed.summary || !parsed.content) throw new Error('Missing required fields in Gemini response');

      // Image: loremflickr.com (free, keyword-based, no API key)
      const kw = encodeURIComponent((parsed.keyword||'news').toLowerCase());
      const uniqueSeed = Date.now() + i;
      const imageUrl = `https://loremflickr.com/800/450/${kw}?lock=${uniqueSeed}`;

      await db.collection('news').add({
        title: parsed.title.trim(),
        summary: parsed.summary.trim(),
        content: parsed.content.trim(),
        imageUrl, thumbnail: imageUrl,
        category: parsed.category === 'kuwait' ? 'kuwait' : 'world',
        source: item.feedSource.source,
        sourceDomain: item.feedSource.domain,
        originalUrl: item.link || '',
        originalTitle: item.title || '',
        status: 'draft',
        aiGenerated: true,
        isBreaking: false,
        hidden: true,
        readTime: '2 min read',
        mediaType: 'image',
        views: 0, likes: 0, commentCount: 0,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        aiCreatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      saved++;
      onLog(`  ✅ Draft saved: "${parsed.title.substring(0,50)}"`);
    } catch (e) {
      onLog(`  ❌ Failed: ${e.message}`);
    }

    if (i < toProcess.length - 1) await new Promise(r => setTimeout(r, 1200));
  }

  onLog(`\n🎉 Done! ${saved}/${toProcess.length} AI drafts ready for review.`);
  onDone(saved);
};

    send:<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,

    img:<><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,

// ── Toast ──────────────────────────────────────────────────────
const ToastList = ({list}) => (
  <div style={{position:'fixed',bottom:80,right:16,zIndex:999,display:'flex',flexDirection:'column',gap:8}}>
    {list.map(t=>(
      <div key={t.id} className="fade-up" style={{padding:'11px 16px',borderRadius:12,fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:10,boxShadow:'0 8px 32px rgba(0,0,0,.5)',background:t.type==='ok'?'#065f46':t.type==='error'?'#7f1d1d':'#1e3a5f',border:`1px solid ${t.type==='ok'?'#34d399':t.type==='error'?'#f87171':'#60a5fa'}`,color:'#fff',minWidth:200,maxWidth:280}}>
        <Ic n={t.type==='ok'?'ok':t.type==='error'?'x':'bell'} s={14}/>
        {t.msg}
      </div>
    ))}
  </div>
);

const useToast = () => {
  const [list,setList] = useState([]);
  const add = useCallback((msg,type='ok')=>{
    const id=Date.now();
    setList(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setList(p=>p.filter(t=>t.id!==id)),3200);
  },[]);
  const Toast = ()=><ToastList list={list}/>;
  return {add,Toast};
};

// ── Media Upload (Image + Video) ──────────────────────────────
const ImgUpload = ({value, onChange, label='Image', accept='both'}) => {
  const [busy, setBusy]       = useState(false);
  const [progress, setProgress] = useState(0);
  const [fileType, setFileType] = useState(''); // 'image' | 'video'
  const [err, setErr]         = useState('');
  const ref = useRef();

  // Detect if saved URL is a video
  const isVideoUrl = v => v && (
    v.includes('/video/upload') ||
    /\.(mp4|mov|avi|webm|mkv|m4v)(\?|$)/i.test(v)
  );

  const upload = file => {
    if (!file) return;
    setErr('');

    // Decide resource type from MIME
    const isVideo = file.type.startsWith('video/');
    setFileType(isVideo ? 'video' : 'image');

    // Max size guard — 100 MB for video, 10 MB for image
    const maxMB = isVideo ? 100 : 10;
    if (file.size > maxMB * 1024 * 1024) {
      setErr(`File too large. Max ${maxMB} MB allowed.`);
      return;
    }

    // Use /auto/upload — Cloudinary detects image vs video automatically
    const endpoint = `https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/auto/upload`;

    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY.uploadPreset);
    fd.append('folder', 'sql_users'); // ✅ folder specify karo

    // Use XHR for real upload progress
    const xhr = new XMLHttpRequest();
    setBusy(true);
    setProgress(0);

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) setProgress(Math.round((e.loaded / e.total) * 100));
    };

    xhr.onload = () => {
      setBusy(false);
      try {
        const json = JSON.parse(xhr.responseText);
        if (json.error) { setErr('Cloudinary: ' + json.error.message); return; }
        onChange(json.secure_url);
        setProgress(0);
      } catch(e) { setErr('Upload failed. Try again.'); }
    };

    xhr.onerror = () => { setBusy(false); setErr('Network error. Check connection.'); };

    xhr.open('POST', endpoint);
    xhr.send(fd);
  };

  const handleDrop = e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = value ? 'var(--success)' : 'var(--border2)';
    upload(e.dataTransfer.files[0]);
  };

  const clear = e => { e.stopPropagation(); onChange(''); setFileType(''); setErr(''); };

  // Accept string for file input
  const acceptStr = accept === 'image' ? 'image/*' : accept === 'video' ? 'video/*' : 'image/*,video/*';

  const currentIsVideo = isVideoUrl(value) || fileType === 'video';

  return (
    <div>
      {label && (
        <p style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.06em',marginBottom:8}}>
          {label.toUpperCase()}
        </p>
      )}

      <div
        style={{
          border:`2px dashed ${err ? 'var(--danger)' : value ? 'var(--success)' : 'var(--border2)'}`,
          borderRadius:12, padding:16, cursor: busy ? 'default' : 'pointer',
          background:'var(--surface2)', transition:'border .2s, background .2s'
        }}
        onClick={() => { if(!busy) ref.current?.click(); }}
        onDragOver={e => { e.preventDefault(); if(!busy) e.currentTarget.style.borderColor='var(--accent)'; }}
        onDragLeave={e => { e.currentTarget.style.borderColor = err?'var(--danger)':value?'var(--success)':'var(--border2)'; }}
        onDrop={handleDrop}
      >
        <input ref={ref} type="file" accept={acceptStr} style={{display:'none'}}
          onChange={e => upload(e.target.files[0])}/>

        {/* ── Uploading State ── */}
        {busy ? (
          <div style={{padding:'8px 0'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div className="spinner" style={{flexShrink:0}}/>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>
                  Uploading {fileType === 'video' ? 'video' : 'image'}…
                </p>
                <p style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Please wait, don't close this page</p>
              </div>
              <span style={{fontSize:14,fontWeight:800,color:'var(--accent)',flexShrink:0}}>{progress}%</span>
            </div>
            {/* Progress bar */}
            <div style={{height:6,background:'var(--border)',borderRadius:999,overflow:'hidden'}}>
              <div style={{
                height:'100%', borderRadius:999,
                background: fileType==='video'
                  ? 'linear-gradient(90deg,var(--info),var(--accent))'
                  : 'linear-gradient(90deg,var(--accent),var(--success))',
                width: progress+'%',
                transition:'width .3s ease'
              }}/>
            </div>
            {fileType === 'video' && (
              <p style={{fontSize:10,color:'var(--dim)',marginTop:6,textAlign:'center'}}>
                🎬 Videos may take a moment — please be patient
              </p>
            )}
          </div>

        ) : value ? (
          /* ── Uploaded State ── */
          <div>
            {currentIsVideo ? (
              /* Video preview */
              <div style={{marginBottom:10,borderRadius:10,overflow:'hidden',background:'#000',position:'relative'}}>
                <video
                  src={value} controls preload="metadata"
                  style={{width:'100%',maxHeight:200,display:'block',borderRadius:10}}
                />
                <span style={{position:'absolute',top:8,left:8,background:'rgba(0,0,0,.7)',
                  color:'#fff',fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:6,
                  letterSpacing:'.04em'}}>
                  🎬 VIDEO
                </span>
              </div>
            ) : (
              /* Image preview */
              <div style={{marginBottom:10,borderRadius:10,overflow:'hidden'}}>
                <img src={value} style={{width:'100%',maxHeight:180,objectFit:'cover',display:'block',borderRadius:10}} alt="preview"/>
              </div>
            )}
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:12,color:'var(--success)',fontWeight:700,marginBottom:1}}>
                  ✅ {currentIsVideo ? 'Video' : 'Image'} uploaded successfully
                </p>
                <p style={{fontSize:10,color:'var(--dim)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {value.split('/').pop().split('?')[0]}
                </p>
              </div>
              <button
                onClick={clear}
                style={{flexShrink:0,background:'rgba(248,113,113,.12)',border:'1px solid rgba(248,113,113,.25)',
                  borderRadius:8,padding:'6px 10px',cursor:'pointer',color:'var(--danger)',
                  fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:4}}
              >
                <Ic n="x" s={12}/> Remove
              </button>
            </div>
          </div>

        ) : (
          /* ── Empty State ── */
          <div style={{textAlign:'center',padding:'12px 0'}}>
            <div style={{display:'flex',justifyContent:'center',gap:12,marginBottom:10}}>
              <div style={{width:36,height:36,borderRadius:10,background:'var(--border)',
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Ic n="img" s={18} c="var(--muted)"/>
              </div>
              {accept !== 'image' && (
                <div style={{width:36,height:36,borderRadius:10,background:'var(--border)',
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                  </svg>
                </div>
              )}
            </div>
            <p style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:4}}>
              Tap to upload or drag &amp; drop
            </p>
            <p style={{fontSize:11,color:'var(--dim)'}}>
              {accept==='image' ? 'JPG, PNG, WebP — max 10 MB'
                : accept==='video' ? 'MP4, MOV, WebM — max 100 MB'
                : '🖼 Images (JPG/PNG) · 🎬 Videos (MP4/MOV)'}
            </p>
          </div>
        )}
      </div>

      {/* Error message */}
      {err && (
        <div style={{marginTop:8,padding:'8px 12px',background:'rgba(248,113,113,.1)',
          border:'1px solid rgba(248,113,113,.2)',borderRadius:8,
          fontSize:12,color:'var(--danger)',display:'flex',alignItems:'center',gap:6}}>
          <Ic n="warn" s={13}/> {err}
        </div>
      )}
    </div>
  );
};

  const [recent,setRecent] = useState([]);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    const u=[];
    u.push(db.collection('news').onSnapshot(s=>{
      const all = s.docs.map(d=>d.data());
      setStats(p=>({...p,
        news: all.filter(d=>d.status!=='draft').length,
        breaking: all.filter(d=>d.isBreaking&&d.status!=='draft').length,
        drafts: all.filter(d=>d.status==='draft').length,
        aiTotal: all.filter(d=>d.aiGenerated).length,
      }));

    u.push(db.collection('users').onSnapshot(s=>setStats(p=>({...p,users:s.size}))));

    u.push(db.collection('ads').onSnapshot(s=>{

        setRecent(s.docs.map(d=>({id:d.id,...d.data()})).filter(n=>n.status!=='draft'));

                <textarea className="inp" value={form.summary}
                  onChange={e=>F({summary:e.target.value})}
                  placeholder="Write a short 2–3 line summary that appears on the news card…"
                  style={{minHeight:100,lineHeight:1.6}}/>
                <p style={{fontSize:11,color:'var(--dim)',marginTop:5}}>{form.summary.length} characters</p>
              </Field>
              <Field label="Full Content (Article Body)">
                <textarea className="inp" value={form.content}
                  onChange={e=>F({content:e.target.value})}
                  placeholder="Write the complete article body here. Supports plain text. Use double line-breaks for paragraphs…"
                  style={{minHeight:200,lineHeight:1.7}}/>
              </Field>
            </div>
          </div>

          {/* Meta Info */}
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:20}}>
            <p style={{fontSize:11,fontWeight:800,color:'var(--info)',letterSpacing:'.08em',marginBottom:14}}>⚙️ ARTICLE SETTINGS</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <Field label="Category" required>
                <select className="inp" value={form.category} onChange={e=>F({category:e.target.value})}>
                  <option value="kuwait">🇰🇼 Kuwait</option>
                  <option value="world">🌍 World</option>
                  <option value="all">📰 All Categories</option>
                </select>
              </Field>
              <Field label="Media Type">
                <select className="inp" value={form.mediaType} onChange={e=>F({mediaType:e.target.value})}>
                  <option value="image">🖼 Image</option>
                  <option value="video">🎬 Video</option>
                </select>
              </Field>
              <Field label="Source Name">
                <input className="inp" value={form.source}
                  onChange={e=>F({source:e.target.value})}
                  placeholder="e.g. KWT News, Reuters…"/>
              </Field>
              <Field label="Read Time">
                <input className="inp" value={form.readTime}
                  onChange={e=>F({readTime:e.target.value})}
                  placeholder="e.g. 3 min read"/>
              </Field>
            </div>
          </div>

        </div>

        {/* RIGHT / SIDEBAR COLUMN */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* Breaking Toggle */}
          <div style={{background: form.isBreaking ? 'rgba(248,113,113,.07)' : 'var(--surface)', border:`1.5px solid ${form.isBreaking?'rgba(248,113,113,.4)':'var(--border)'}`,borderRadius:16,padding:20,transition:'all .2s'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
              <div>
                <p style={{fontSize:14,fontWeight:800,color: form.isBreaking ? 'var(--danger)' : 'var(--text)'}}>
                  🚨 Breaking News
                </p>
                <p style={{fontSize:12,color:'var(--muted)',marginTop:4,lineHeight:1.5}}>
                  Pins this article to the top of the feed with a BREAKING badge
                </p>
              </div>
              <button
                className="tog"
                style={{background:form.isBreaking?'var(--danger)':'var(--border2)',flexShrink:0}}
                onClick={()=>F({isBreaking:!form.isBreaking})}>
                <div className="tog-thumb" style={{left:form.isBreaking?'22px':'4px'}}></div>
              </button>
            </div>
            {form.isBreaking && (
              <div style={{marginTop:12,padding:'8px 12px',background:'rgba(248,113,113,.1)',borderRadius:8,fontSize:12,color:'var(--danger)',fontWeight:600}}>
                ⚡ This article will appear as BREAKING in the news feed
              </div>
            )}
          </div>

          {/* Article Image / Video Upload */}
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:20}}>
            <p style={{fontSize:11,fontWeight:800,color:'var(--muted)',letterSpacing:'.08em',marginBottom:14}}>
              {form.mediaType === 'video' ? '🎬 ARTICLE VIDEO' : '🖼 ARTICLE IMAGE'}
            </p>
            {form.mediaType === 'video' ? (
              <ImgUpload
                value={form.imageUrl}
                onChange={v=>F({imageUrl:v})}
                label=""
                accept="video"
              />
            ) : (
              <ImgUpload
                value={form.imageUrl}
                onChange={v=>F({imageUrl:v})}
                label=""
                accept="image"
              />
            )}
            {/* Thumbnail for video */}
            {form.mediaType === 'video' && (
              <div style={{marginTop:14}}>
                <p style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.06em',marginBottom:8}}>
                  🖼 VIDEO THUMBNAIL (Optional)
                </p>
                <ImgUpload
                  value={form.thumbnail}
                  onChange={v=>F({thumbnail:v})}
                  label=""
                  accept="image"
                />
              </div>
            )}
          </div>

          {/* Source Logo */}
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:20}}>
            <p style={{fontSize:11,fontWeight:800,color:'var(--muted)',letterSpacing:'.08em',marginBottom:14}}>🏷 SOURCE LOGO</p>
            <ImgUpload value={form.sourceLogo} onChange={v=>F({sourceLogo:v})} label=""/>
            {form.sourceLogo && (
              <div style={{marginTop:12,display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--surface2)',borderRadius:10,border:'1px solid var(--border)'}}>
                <img src={form.sourceLogo} style={{width:36,height:36,objectFit:'cover',borderRadius:8}} alt="logo"/>
                <div>
                  <p style={{fontSize:12,fontWeight:600,color:'var(--success)'}}>✅ Logo uploaded</p>
                  <p style={{fontSize:10,color:'var(--dim)',marginTop:1}}>{form.source || 'Source'}</p>
                </div>
              </div>
            )}
          </div>

          {/* Live Preview Card */}
          {(form.title || form.imageUrl) && (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:20}}>
              <p style={{fontSize:11,fontWeight:800,color:'var(--muted)',letterSpacing:'.08em',marginBottom:14}}>👁 LIVE PREVIEW</p>
              <div style={{background:'var(--surface2)',borderRadius:12,overflow:'hidden',border:'1px solid var(--border)'}}>
                {form.imageUrl ? (
                  form.mediaType === 'video' ? (
                    <video src={form.imageUrl} poster={form.thumbnail} controls
                      style={{width:'100%',height:140,display:'block',background:'#000'}}/>
                  ) : (
                    <img src={form.imageUrl} style={{width:'100%',height:140,objectFit:'cover',display:'block'}} alt=""/>
                  )
                ) : (
                  <div style={{height:80,background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Ic n={form.mediaType==='video'?'img':'img'} s={24} c="var(--dim)"/>
                  </div>
                )}
                <div style={{padding:12}}>
                  {form.isBreaking && <span style={{fontSize:9,fontWeight:800,color:'var(--danger)',background:'rgba(248,113,113,.12)',border:'1px solid rgba(248,113,113,.2)',borderRadius:4,padding:'2px 6px',display:'inline-block',marginBottom:6,letterSpacing:'.05em'}}>⚡ BREAKING</span>}
                  <p style={{fontSize:13,fontWeight:700,lineHeight:1.4,marginBottom:4,color:'var(--text)'}}>{form.title || 'Your headline here…'}</p>
                  {form.summary && <p style={{fontSize:11,color:'var(--muted)',lineHeight:1.5,WebkitLineClamp:2,display:'-webkit-box',WebkitBoxOrient:'vertical',overflow:'hidden'}}>{form.summary}</p>}
                  <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
                    {form.sourceLogo && <img src={form.sourceLogo} style={{width:16,height:16,borderRadius:3,objectFit:'cover'}}/>}
                    <span style={{fontSize:10,color:'var(--dim)'}}>{form.source || 'KWT News'}</span>
                    <span style={{fontSize:10,color:'var(--dim)'}}>· {form.readTime || '3 min read'}</span>
                    <span style={{fontSize:9,color:'var(--dim)',marginLeft:'auto',padding:'2px 6px',background:'var(--border)',borderRadius:4}}>{form.category}</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Bottom Save Button (mobile sticky) */}
          <button className="btn btn-accent" onClick={save} disabled={saving}
            style={{width:'100%',padding:'15px',fontSize:15,borderRadius:14,fontWeight:700}}>
            {saving
              ? <><span className="spinner" style={{width:18,height:18}}/> Saving…</>
              : <><Ic n={editing?'ok':'send'} s={16}/>{editing ? 'Update Article' : 'Publish Article'}</>
            }
          </button>

        </div>
      </div>

      {/* Responsive 2-col CSS */}
      <style>{`
        @media(min-width:680px){
          .form-grid{ grid-template-columns: 1fr 360px !important; }
        }
      `}</style>
    </div>
  );
};

// ── NEWS MANAGER ───────────────────────────────────────────────
const NewsManager = ({toast}) => {
  const [news,setNews] = useState([]);
  const [loading,setLoading] = useState(true);
  const [view,setView] = useState('list');
  const [editing,setEditing] = useState(null);
  const [formInit,setFormInit] = useState(BLANK);
  const [confirm,setConfirm] = useState(null);
  const [search,setSearch] = useState('');
  const [cat,setCat] = useState('all');
  const [visFilter,setVisFilter] = useState('visible');
  const [approvingId,setApprovingId] = useState(null);

  useEffect(()=>{
    const u=db.collection('news').orderBy('timestamp','desc').limit(100).onSnapshot(s=>{
      setNews(s.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);
    });
    return ()=>u();
  },[]);

  const openAdd=()=>{ setEditing(null); setFormInit(BLANK); setView('form'); };
  const openEdit=n=>{ setEditing(n.id); setFormInit({...BLANK,...n}); setView('form'); };
  const closeForm=()=>{ setView('list'); setEditing(null); setFormInit(BLANK); };

  const del=async id=>{
    try{ await db.collection('news').doc(id).delete(); toast.add('Article deleted'); }
    catch(e){ toast.add(e.message,'error'); }
    setConfirm(null);
  };

  const toggleBreaking=async(id,val)=>{
    await db.collection('news').doc(id).update({isBreaking:!val});
    toast.add(!val?'Marked as Breaking!':'Breaking removed');
  };

  const toggleHidden=async(id,val)=>{
    await db.collection('news').doc(id).update({hidden:!val});
    toast.add(!val?'Article hidden':'Article visible');
  };

  const approveDraft = async (item) => {
    setApprovingId(item.id);
    try {
      await db.collection('news').doc(item.id).update({
        status: 'published', hidden: false,
        approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      toast.add('✅ Article published to website!');
    } catch(e) { toast.add(e.message,'error'); }
    setApprovingId(null);
  };

  const draftCount = news.filter(n=>n.status==='draft').length;
  const published = news.filter(n=>n.status!=='draft');

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    if(visFilter==='draft'){
      return news.filter(n=>{
        const mQ=!q||n.title?.toLowerCase().includes(q);
        const mC=cat==='all'||n.category===cat;
        return n.status==='draft'&&mQ&&mC;
      });
    }
    return published.filter(n=>{
      const mQ=!q||n.title?.toLowerCase().includes(q);
      const mC=cat==='all'||n.category===cat;
      const mV=visFilter==='all'||(visFilter==='hidden'?n.hidden===true:!n.hidden);
      return mQ&&mC&&mV;
    });
  },[news,search,cat,visFilter]);

  if(view==='form') return (
    <NewsForm editing={editing} initialForm={formInit} onSave={closeForm} onCancel={closeForm} toast={toast}/>
  );

  const DraftCard = ({n}) => (
    <div style={{padding:'16px',borderBottom:'1px solid rgba(26,45,74,.5)',background:'rgba(167,139,250,.03)'}}>
      <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
        <div style={{width:80,height:60,borderRadius:10,background:'var(--surface2)',overflow:'hidden',flexShrink:0,border:'1px solid rgba(167,139,250,.2)'}}>
          {n.imageUrl
            ? <img src={n.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}} loading="lazy" onError={e=>{e.target.style.display='none';}}/>
            : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="img" s={20} c="var(--dim)"/></div>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:5,flexWrap:'wrap'}}>
            <span className="badge" style={{background:'rgba(167,139,250,.12)',color:'#a78bfa',border:'1px solid rgba(167,139,250,.25)',fontSize:9}}>🤖 AI DRAFT</span>
            <span style={{fontSize:10,color:'var(--dim)'}}>{timeAgo(n.aiCreatedAt||n.timestamp)}</span>
            <span style={{fontSize:10,color:'var(--muted)',background:'var(--surface2)',padding:'1px 6px',borderRadius:4,border:'1px solid var(--border)'}}>{n.category||'world'}</span>
          </div>
          <p style={{fontSize:13,fontWeight:700,marginBottom:4,lineHeight:1.4}}>{n.title||'Untitled'}</p>
          <p style={{fontSize:11,color:'var(--muted)',lineHeight:1.5,marginBottom:4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{n.summary}</p>
          {n.sourceDomain&&<p style={{fontSize:10,color:'var(--dim)'}}>📰 {n.source} · {n.sourceDomain}</p>}
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button className="btn" disabled={approvingId===n.id} onClick={()=>approveDraft(n)}
          style={{flex:1,padding:'9px',fontSize:12,fontWeight:700,background:'rgba(52,211,153,.1)',color:'var(--success)',border:'1.5px solid rgba(52,211,153,.25)',borderRadius:10,gap:6}}>
          {approvingId===n.id
            ? <><span className="spinner" style={{width:14,height:14}}/> Publishing…</>
            : <><Ic n="ok" s={14}/> Approve &amp; Publish</>}
        </button>
        <button className="btn btn-icon" title="Edit before approving" onClick={()=>openEdit(n)} style={{padding:'9px 14px'}}>
          <Ic n="edit" s={14}/>
        </button>
        <button className="btn btn-red" title="Delete draft" style={{padding:'9px 12px'}} onClick={()=>setConfirm(n)}>
          <Ic n="trash" s={14}/>
        </button>
      </div>
    </div>
  );

  return (
    <div className="fade-up">
      {confirm&&<Confirm msg={`Delete "${confirm.title}"?`} onYes={()=>del(confirm.id)} onNo={()=>setConfirm(null)}/>}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,gap:12,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontFamily:'Outfit',fontSize:24,fontWeight:800,letterSpacing:'-.02em'}}>News</h1>
          <p style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
            {published.filter(n=>!n.hidden).length} visible · {published.filter(n=>n.hidden).length} hidden · {published.filter(n=>n.isBreaking).length} breaking
            {draftCount>0&&<span style={{color:'#a78bfa',marginLeft:6}}>· 🤖 {draftCount} drafts</span>}
          </p>
        </div>
        <button className="btn btn-accent" style={{padding:'11px 20px',gap:8,fontSize:14}} onClick={openAdd}>
          <Ic n="plus" s={16}/> Add Article
        </button>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}>
            <Ic n="search" s={15} c="var(--dim)"/>
          </div>
          <input className="inp" placeholder="Search articles by title…" value={search}
            onChange={e=>setSearch(e.target.value)} style={{paddingLeft:40}}/>
        </div>
        <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:2}}>
          {[{v:'all',label:'All'},{v:'kuwait',label:'🇰🇼 Kuwait'},{v:'world',label:'🌍 World'}].map(({v,label})=>(
            <button key={v} onClick={()=>setCat(v)}
              style={{padding:'7px 16px',borderRadius:8,fontSize:12,fontWeight:600,border:'1px solid',cursor:'pointer',transition:'all .15s',whiteSpace:'nowrap',
                background:cat===v?'var(--accent)':'transparent',color:cat===v?'#050c18':'var(--muted)',borderColor:cat===v?'var(--accent)':'var(--border)'}}>
              {label}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:2}}>
          {[
            {v:'visible',label:'👁 Visible',cnt:published.filter(n=>!n.hidden).length,ai:false},
            {v:'hidden',label:'🚫 Hidden',cnt:published.filter(n=>n.hidden).length,ai:false,danger:true},
            {v:'all',label:'All Published',cnt:published.length,ai:false},
            {v:'draft',label:'🤖 AI Drafts',cnt:draftCount,ai:true},
          ].map(({v,label,cnt,ai,danger})=>(
            <button key={v} onClick={()=>setVisFilter(v)}
              style={{padding:'7px 14px',borderRadius:8,fontSize:12,fontWeight:600,border:'1px solid',cursor:'pointer',
                transition:'all .15s',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6,
                background:visFilter===v?(ai?'rgba(167,139,250,.15)':danger?'rgba(248,113,113,.15)':'var(--accent)'):'transparent',
                color:visFilter===v?(ai?'#a78bfa':danger?'var(--danger)':'#050c18'):(ai?'#a78bfa':danger?'var(--danger)':'var(--muted)'),
                borderColor:visFilter===v?(ai?'rgba(167,139,250,.5)':danger?'var(--danger)':'var(--accent)'):(ai?'rgba(167,139,250,.3)':danger?'rgba(248,113,113,.3)':'var(--border)')}}>
              {label}
              <span style={{background:'rgba(255,255,255,.15)',borderRadius:999,padding:'0px 7px',fontSize:10,fontWeight:800}}>{cnt}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="card">
        {visFilter==='draft'&&(
          <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'rgba(167,139,250,.06)',display:'flex',alignItems:'center',gap:10}}>
            <Ic n="bot" s={16} c="#a78bfa"/>
            <div style={{flex:1}}>
              <span style={{fontWeight:700,fontSize:13,color:'#a78bfa'}}>AI Generated Drafts</span>
              <span style={{fontSize:11,color:'var(--muted)',marginLeft:8}}>Review carefully before approving</span>
            </div>
          </div>
        )}
        {loading ? [1,2,3,4].map(i=>(
          <div key={i} style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',gap:12,alignItems:'center'}}>
            <div className="shimmer" style={{width:56,height:56,borderRadius:12,flexShrink:0}}></div>
            <div style={{flex:1}}>
              <div className="shimmer" style={{height:13,borderRadius:6,width:'65%',marginBottom:8}}></div>
              <div className="shimmer" style={{height:10,borderRadius:6,width:'35%'}}></div>
            </div>
          </div>
        )) : filtered.length===0 ? (
          <div style={{padding:56,textAlign:'center',color:'var(--dim)'}}>
            <Ic n={visFilter==='draft'?'bot':'news'} s={32} c="var(--border2)"/>
            <p style={{marginTop:14,fontSize:14,fontWeight:600}}>
              {visFilter==='draft'?'No AI drafts pending':'No articles found'}
            </p>
            <p style={{fontSize:12,marginTop:4}}>
              {visFilter==='draft'?'Use AI Bot page to auto-fetch news':'Try changing the filter or add new article'}
            </p>
            {visFilter!=='draft'&&<button className="btn btn-accent" style={{marginTop:16,padding:'10px 20px'}} onClick={openAdd}><Ic n="plus" s={14}/> Add Article</button>}
          </div>
        ) : visFilter==='draft'
          ? filtered.map(n=><DraftCard key={n.id} n={n}/>)
          : filtered.map(n=>(
          <div key={n.id} className="row"
            style={{padding:'13px 16px',borderBottom:'1px solid rgba(26,45,74,.5)',display:'flex',alignItems:'center',
              gap:12,opacity:n.hidden?0.45:1,transition:'opacity .2s'}}>
            <div style={{width:56,height:56,borderRadius:12,background:'var(--surface2)',overflow:'hidden',flexShrink:0,position:'relative',border:'1px solid var(--border)'}}>
              {n.imageUrl
                ? <img src={n.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover',filter:n.hidden?'grayscale(1)':''}} loading="lazy"/>
                : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="img" s={20} c="var(--dim)"/></div>}
              {n.hidden&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.55)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="eyeoff" s={16} c="#fff"/></div>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:4}}>{n.title||'Untitled Article'}</p>
              <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:11,color:'var(--dim)'}}>{timeAgo(n.timestamp)}</span>
                <span style={{fontSize:10,color:'var(--muted)',background:'var(--surface2)',padding:'1px 6px',borderRadius:4,border:'1px solid var(--border)'}}>{n.category||'all'}</span>
                {n.isBreaking&&<span className="badge" style={{background:'rgba(248,113,113,.12)',color:'var(--danger)',border:'1px solid rgba(248,113,113,.25)',fontSize:9}}>⚡ BREAKING</span>}
                {n.hidden&&<span className="badge" style={{background:'rgba(100,116,139,.1)',color:'var(--muted)',border:'1px solid rgba(100,116,139,.2)',fontSize:9}}>HIDDEN</span>}
                {n.aiGenerated&&<span className="badge" style={{background:'rgba(167,139,250,.1)',color:'#a78bfa',border:'1px solid rgba(167,139,250,.2)',fontSize:9}}>🤖 AI</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:5,flexShrink:0,alignItems:'center'}}>
              <button className="tog" style={{background:n.isBreaking?'var(--danger)':'var(--border2)'}} onClick={()=>toggleBreaking(n.id,n.isBreaking)}>
                <div className="tog-thumb" style={{left:n.isBreaking?'22px':'4px'}}></div>
              </button>
              <button className="btn btn-icon" style={{background:n.hidden?'rgba(245,166,35,.12)':'var(--surface2)',borderColor:n.hidden?'rgba(245,166,35,.35)':'var(--border)',color:n.hidden?'var(--accent)':'var(--muted)'}} onClick={()=>toggleHidden(n.id,!!n.hidden)}>
                <Ic n={n.hidden?'eye':'eyeoff'} s={14}/>
              </button>
              <button className="btn btn-icon" onClick={()=>openEdit(n)}><Ic n="edit" s={14}/></button>
              <button className="btn btn-red" onClick={()=>setConfirm(n)}><Ic n="trash" s={14}/></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── ADS MANAGER ────────────────────────────────────────────────
const BLANK_AD = {title:'',position:'top_banner',targetUrl:'',imageUrl:'',startDate:'',endDate:'',active:true,impressions:0,clicks:0};
const AdsManager = ({toast}) => {
  const [ads,setAds] = useState([]);
  const [loading,setLoading] = useState(true);
  const [modal,setModal] = useState(false);
  const [editing,setEditing] = useState(null);
  const [form,setForm] = useState(BLANK_AD);
  const [saving,setSaving] = useState(false);
  const [confirm,setConfirm] = useState(null);

  useEffect(()=>{
    const u=db.collection('ads').orderBy('createdAt','desc').onSnapshot(s=>{
      setAds(s.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);
    });
    return ()=>u();
  },[]);

  const open=ad=>{
    if(ad){
      setEditing(ad.id);
      // Don't carry impression/click counters into form (they're read-only)
      const {impressions,clicks,...rest}=ad;
      setForm({...BLANK_AD,...rest});
    } else {
      setEditing(null);
      setForm(BLANK_AD);
    }
    setModal(true);
  };
  const close=()=>{setModal(false);setEditing(null);setForm(BLANK_AD);};

  // Lock body scroll when modal open
  useEffect(()=>{
    if(modal){document.body.classList.add('modal-open');}
    else{document.body.classList.remove('modal-open');}
    return()=>document.body.classList.remove('modal-open');
  },[modal]);

  const save=async()=>{
    if(!form.title.trim()){toast.add('Title required','error');return;}
    setSaving(true);
    try{
      if(editing){
        const d={...form};
        delete d.createdAt; // preserve original createdAt on edit
        delete d.impressions; // never overwrite impression counters on edit
        delete d.clicks;
        await db.collection('ads').doc(editing).update(d);
        toast.add('Ad updated!');
      } else {
        const d={...form,createdAt:firebase.firestore.FieldValue.serverTimestamp(),impressions:0,clicks:0};
        await db.collection('ads').add(d);
        toast.add('Ad created!');
      }
      close();
    }catch(e){toast.add(e.message,'error');}
    finally{setSaving(false);}
  };

  const del=async id=>{
    try{await db.collection('ads').doc(id).delete();toast.add('Deleted');}
    catch(e){toast.add(e.message,'error');}
    setConfirm(null);
  };

  const toggleActive=async(id,val)=>{
    await db.collection('ads').doc(id).update({active:!val});
    toast.add(!val?'Ad activated':'Ad paused');
  };

  const F=p=>setForm(prev=>({...prev,...p}));

  return (
    <div className="fade-up">
      {confirm&&<Confirm msg={`Delete ad "${confirm.title}"?`} onYes={()=>del(confirm.id)} onNo={()=>setConfirm(null)}/>}

      {modal&&(
        <div className="modal-bg" onClick={close}>
          <div className="modal slide-up" onClick={e=>e.stopPropagation()}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:'var(--surface)',zIndex:10}}>
              <h3 style={{fontWeight:800,fontSize:17}}>{editing?'Edit Ad':'New Ad'}</h3>
              <button className="btn btn-ghost" style={{padding:'8px'}} onClick={close}><Ic n="x" s={16}/></button>
            </div>
            <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:16}}>
              <Field label="Ad Title" required>
                <input className="inp" value={form.title} onChange={e=>F({title:e.target.value})} placeholder="Ad title…"/>
              </Field>
              <Field label="Position">
                <select className="inp" value={form.position} onChange={e=>F({position:e.target.value})}>
                  {AD_POSITIONS.map(p=><option key={p} value={p}>{posLabel(p)}</option>)}
                </select>
              </Field>
              <Field label="Target URL">
                <input className="inp" value={form.targetUrl} onChange={e=>F({targetUrl:e.target.value})} placeholder="https://…"/>
              </Field>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <Field label="Start Date">
                  <input className="inp" type="date" value={form.startDate} onChange={e=>F({startDate:e.target.value})}/>
                </Field>
                <Field label="End Date">
                  <input className="inp" type="date" value={form.endDate} onChange={e=>F({endDate:e.target.value})}/>
                </Field>
              </div>
              <ImgUpload value={form.imageUrl} onChange={v=>F({imageUrl:v})} label="Banner Image"/>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',background:'rgba(52,211,153,.06)',border:'1px solid rgba(52,211,153,.15)',borderRadius:12}}>
                <div>
                  <p style={{fontSize:13,fontWeight:700,color:'var(--success)'}}>Active</p>
                  <p style={{fontSize:11,color:'var(--dim)',marginTop:1}}>Visible to users</p>
                </div>
                <button className="tog" style={{background:form.active?'var(--success)':'var(--border2)'}} onClick={()=>F({active:!form.active})}>
                  <div className="tog-thumb" style={{left:form.active?'22px':'4px'}}></div>
                </button>
              </div>
            </div>
            <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',display:'flex',gap:10,justifyContent:'flex-end',position:'sticky',bottom:0,background:'var(--surface)'}}>
              <button className="btn btn-ghost" onClick={close}>Cancel</button>
              <button className="btn btn-accent" onClick={save} disabled={saving} style={{minWidth:120}}>
                {saving?<span className="spinner" style={{width:16,height:16}}></span>:(editing?'Update':'Create')}
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <h1 style={{fontFamily:'Outfit',fontSize:24,fontWeight:800,letterSpacing:'-.02em'}}>Ads</h1>
          <p style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{ads.length} ads</p>
        </div>
        <button className="btn btn-accent" style={{padding:'10px 16px',gap:6}} onClick={()=>open()}>
          <Ic n="plus" s={15}/> Add
        </button>
      </div>

      {/* Position overview */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10,marginBottom:20}}>
        {AD_POSITIONS.map(pos=>{
          const cnt=ads.filter(a=>a.position===pos&&a.active).length;
          return (
            <div key={pos} style={{padding:'12px 14px',borderRadius:12,background:cnt>0?'rgba(245,166,35,.08)':'var(--surface)',border:`1px solid ${cnt>0?'rgba(245,166,35,.25)':'var(--border)'}`}}>
              <p style={{fontSize:10,fontWeight:700,color:cnt>0?'var(--accent)':'var(--dim)',marginBottom:4}}>{posLabel(pos)}</p>
              <p style={{fontSize:22,fontWeight:800,color:cnt>0?'var(--accent)':'var(--border2)'}}>{cnt}</p>
              <p style={{fontSize:10,color:'var(--dim)'}}>active</p>
            </div>
          );
        })}
      </div>

      <div className="card">
        {loading?<div style={{padding:40,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}></div></div>:
        ads.length===0?(
          <div style={{padding:48,textAlign:'center',color:'var(--dim)'}}>
            <Ic n="ads" s={28} c="var(--border2)"/>
            <p style={{marginTop:12,fontSize:13}}>No ads yet</p>
          </div>
        ):ads.map(a=>(
          <div key={a.id} className="row" style={{padding:'13px 16px',borderBottom:'1px solid rgba(26,45,74,.5)',display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:52,height:40,borderRadius:8,background:'var(--surface2)',overflow:'hidden',flexShrink:0}}>
              {a.imageUrl&&<img src={a.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}} loading="lazy"/>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                <p style={{fontSize:13,fontWeight:600}}>{a.title}</p>
                <span className="badge" style={{background:a.active?'rgba(52,211,153,.1)':'rgba(100,116,139,.1)',color:a.active?'var(--success)':'var(--muted)',border:`1px solid ${a.active?'rgba(52,211,153,.2)':'rgba(100,116,139,.2)'}`,fontSize:9}}>{a.active?'LIVE':'PAUSED'}</span>
              </div>
              <p style={{fontSize:11,color:'var(--dim)'}}>{posLabel(a.position)} · 👁{fmt(a.impressions)} · CTR {ctr(a)}</p>

  );
};

// ── PUSH NOTIFICATIONS ────────────────────────────────────────
const PushNotifs = ({toast}) => {
  const [title,setTitle] = useState('');
  const [body,setBody] = useState('');
  const [sending,setSending] = useState(false);
  const [serverKey,setServerKey] = useState(()=>{ try{return localStorage.getItem('fcm_sk')||'';}catch(e){return '';} });
  const [tokenCount,setTokenCount] = useState(0);
  const [history,setHistory] = useState([]);
  const [showKey,setShowKey] = useState(false);

  useEffect(()=>{
    db.collection('fcm_tokens').get().then(s=>setTokenCount(s.size));
    db.collection('notification_history').orderBy('sentAt','desc').limit(10).onSnapshot(s=>{
      setHistory(s.docs.map(d=>({id:d.id,...d.data()})));
    });
  },[]);

  const saveKey=()=>{ try{localStorage.setItem('fcm_sk',serverKey);}catch(e){} toast.add('Key saved'); };

  const send=async()=>{
    if(!title.trim()||!body.trim()){toast.add('Title and message required','error');return;}
    setSending(true);
    try{
      const snap=await db.collection('fcm_tokens').get();
      const tokens=snap.docs.map(d=>d.data().token).filter(Boolean);
      if(!tokens.length){toast.add('No subscribers','error');setSending(false);return;}
      await db.collection('notification_history').add({title,body,sentAt:firebase.firestore.FieldValue.serverTimestamp(),tokenCount:tokens.length,status:'sent'});
      if(serverKey){
        const batches=[];
        for(let i=0;i<tokens.length;i+=1000) batches.push(tokens.slice(i,i+1000));
        await Promise.all(batches.map(batch=>fetch('https://fcm.googleapis.com/fcm/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'key='+serverKey},body:JSON.stringify({registration_ids:batch,notification:{title,body},android:{priority:'high'},apns:{headers:{'apns-priority':'10'}}})})));
      }
      toast.add(`Sent to ${tokens.length} subscribers!`);
      setTitle(''); setBody('');
    }catch(e){toast.add(e.message,'error');}
    finally{setSending(false);}
  };

  return (
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <h1 style={{fontFamily:'Outfit',fontSize:24,fontWeight:800,letterSpacing:'-.02em'}}>Push Alerts</h1>
        <p style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{fmt(tokenCount)} subscribers</p>
      </div>

      {/* Compose */}
      <div className="card" style={{padding:20,marginBottom:16}}>
        <p style={{fontWeight:700,fontSize:14,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
          <Ic n="send" s={15} c="var(--accent)"/> Compose Alert
        </p>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Field label="Title" required>
            <input className="inp" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Breaking: …"/>
          </Field>
          <Field label="Message" required>
            <textarea className="inp" value={body} onChange={e=>setBody(e.target.value)} placeholder="Alert message…" style={{minHeight:100}}/>
          </Field>
          {title&&body&&(
            <div style={{padding:14,background:'var(--surface2)',borderRadius:12,border:'1px solid var(--border)'}}>
              <p style={{fontSize:10,fontWeight:700,color:'var(--dim)',letterSpacing:'.06em',marginBottom:10}}>PREVIEW</p>
              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <div style={{width:32,height:32,borderRadius:8,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:10,fontWeight:900,color:'#050c18'}}>KWT</span>
                </div>
                <div>
                  <p style={{fontSize:13,fontWeight:700,marginBottom:2}}>{title}</p>
                  <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.4}}>{body}</p>
                </div>
              </div>
            </div>
          )}
          <button className="btn btn-accent" style={{width:'100%',padding:'13px',fontSize:14}} onClick={send} disabled={sending||!title||!body}>
            {sending?<><span className="spinner" style={{width:16,height:16}}></span> Sending…</>:<><Ic n="send" s={15}/>Send to {fmt(tokenCount)} Subscribers</>}
          </button>
        </div>
      </div>

      {/* FCM key */}
      <div className="card" style={{padding:20,marginBottom:16}}>
        <p style={{fontWeight:700,fontSize:14,marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
          <Ic n="cog" s={15} c="var(--muted)"/> FCM Server Key
        </p>
        <p style={{fontSize:12,color:'var(--muted)',marginBottom:14,lineHeight:1.6}}>Firebase Console → Project Settings → Cloud Messaging → Legacy server key</p>
        <div style={{display:'flex',gap:8}}>
          <input className="inp" type={showKey?'text':'password'} value={serverKey} onChange={e=>setServerKey(e.target.value)} placeholder="AAAAxxx…" style={{flex:1}}/>
          <button className="btn btn-ghost" style={{padding:'10px 12px',flexShrink:0}} onClick={()=>setShowKey(v=>!v)}><Ic n="eye" s={14}/></button>
          <button className="btn btn-ghost" style={{padding:'10px 14px',flexShrink:0}} onClick={saveKey}>Save</button>
        </div>
        {serverKey&&<p style={{fontSize:11,color:'var(--success)',marginTop:8}}>✓ Saved locally</p>}

      {/* History */}
      <div className="card" style={{padding:20}}>
        <p style={{fontWeight:700,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
          <Ic n="refresh" s={15} c="var(--muted)"/> History
        </p>
        {history.length===0?(
          <p style={{fontSize:13,color:'var(--dim)',textAlign:'center',padding:'12px 0'}}>No notifications sent yet</p>

          <div key={h.id} style={{padding:'11px 0',borderBottom:'1px solid var(--border)',display:'flex',gap:10,alignItems:'flex-start'}}>

};

// ── AI BOT PAGE ────────────────────────────────────────────────
const AIBotPage = ({toast}) => {
  const [logs,setLogs] = useState([]);
  const [running,setRunning] = useState(false);
  const [draftCount,setDraftCount] = useState(0);
  const [aiTotal,setAiTotal] = useState(0);
  const [lastRun,setLastRun] = useState(null);
  const logsRef = useRef(null);

  useEffect(()=>{
    const u1=db.collection('news').where('status','==','draft').onSnapshot(s=>setDraftCount(s.size),()=>setDraftCount(0));
    const u2=db.collection('news').where('aiGenerated','==',true).onSnapshot(s=>setAiTotal(s.size),()=>setAiTotal(0));
    const saved=localStorage.getItem('ai_last_run');
    if(saved)setLastRun(new Date(parseInt(saved)));
    return()=>{u1();u2();};
  },[]);

  useEffect(()=>{
    if(logsRef.current)logsRef.current.scrollTop=logsRef.current.scrollHeight;
  },[logs]);

  const addLog = (msg) => {
    setLogs(p=>[...p.slice(-80),{msg,time:new Date().toLocaleTimeString()}]);
  };

  const run = async() => {
    setRunning(true);
    setLogs([]);
    try{
      await fetchAndRewriteNews(addLog,(saved)=>{
        if(saved>0) toast.add(`🤖 ${saved} AI draft${saved>1?'s':''} ready for review!`);
        else toast.add('No new articles found this time','info');
        const now=Date.now();
        localStorage.setItem('ai_last_run',now.toString());
        setLastRun(new Date(now));
      });
    }catch(e){
      addLog(`💥 Error: ${e.message}`);
      toast.add('AI fetch failed: '+e.message,'error');
    }
    setRunning(false);
  };

  return(
    <div className="fade-up">
      {/* Header */}
      <div style={{marginBottom:24}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <div style={{width:40,height:40,borderRadius:12,background:'rgba(167,139,250,.15)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n="bot" s={22} c="#a78bfa"/>
          </div>
          <div>
            <h1 style={{fontFamily:'Outfit',fontSize:24,fontWeight:800,letterSpacing:'-.02em'}}>AI News Bot</h1>
            <p style={{fontSize:12,color:'var(--muted)'}}>Powered by Gemini 2.0 Flash · BBC · Al Jazeera · Sky News · CNN</p>
          </div>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
        <div className="stat" style={{borderLeft:'3px solid #a78bfa'}}>
          <div style={{fontSize:28,fontWeight:800,color:'#a78bfa'}}>{draftCount}</div>
          <div style={{fontSize:13,fontWeight:600}}>Pending</div>
          <div style={{fontSize:11,color:'var(--dim)'}}>Awaiting review</div>
        </div>
        <div className="stat" style={{borderLeft:'3px solid var(--info)'}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--info)'}}>{aiTotal}</div>
          <div style={{fontSize:13,fontWeight:600}}>AI Total</div>
          <div style={{fontSize:11,color:'var(--dim)'}}>All time</div>
        </div>
        <div className="stat" style={{borderLeft:`3px solid ${running?'var(--accent)':'var(--success)'}`}}>
          <div style={{fontSize:22,fontWeight:800,color:running?'var(--accent)':'var(--success)'}}>{running?'🔄':'✅'}</div>
          <div style={{fontSize:13,fontWeight:600}}>Status</div>
          <div style={{fontSize:11,color:'var(--dim)'}}>{running?'Fetching...':'Ready'}</div>
        </div>
      </div>

      {/* Control Panel */}
      <div className="card" style={{padding:20,marginBottom:16}}>
        <p style={{fontSize:11,fontWeight:800,color:'var(--accent)',letterSpacing:'.08em',marginBottom:16}}>🎮 CONTROL PANEL</p>
        <button className="btn btn-accent" onClick={run} disabled={running}
          style={{width:'100%',padding:'14px',fontSize:15,fontWeight:700,gap:10,borderRadius:12}}>
          {running
            ? <><span className="spinner" style={{width:18,height:18}}/> Fetching &amp; Rewriting News…</>
            : <><Ic n="refresh" s={18}/> Fetch &amp; AI Rewrite News</>}
        </button>
        {lastRun&&(
          <p style={{fontSize:11,color:'var(--dim)',textAlign:'center',marginTop:10}}>
            Last run: {lastRun.toLocaleString()}
          </p>
        )}
        <div style={{marginTop:14,padding:'12px 14px',borderRadius:10,background:'rgba(96,165,250,.07)',border:'1px solid rgba(96,165,250,.18)'}}>
          <p style={{fontSize:12,color:'var(--info)',fontWeight:600,marginBottom:4}}>📋 How It Works</p>
          <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.7}}>
            1. Fetches news from 4 international RSS feeds<br/>
            2. Checks Firebase for duplicates (skips existing)<br/>
            3. Sends each article to Gemini AI for rewriting (120 words)<br/>
            4. Auto-detects category (Kuwait / World)<br/>
            5. Saves as <strong style={{color:'#a78bfa'}}>draft</strong> → Go to <strong>News → 🤖 AI Drafts</strong> to review
          </div>
        </div>
      </div>

      {/* News Sources */}
      <div className="card" style={{padding:20,marginBottom:16}}>
        <p style={{fontSize:11,fontWeight:800,color:'var(--muted)',letterSpacing:'.08em',marginBottom:14}}>📡 NEWS SOURCES (RSS FEEDS)</p>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {NEWS_FEEDS.map((f,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,background:'var(--surface2)',border:'1px solid var(--border)'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:'var(--success)',flexShrink:0}}></div>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:600}}>{f.source}</p>
                <p style={{fontSize:10,color:'var(--dim)',fontFamily:'DM Mono,monospace'}}>{f.domain}</p>
              </div>
              <span className="badge" style={{background:'rgba(52,211,153,.08)',color:'var(--success)',border:'1px solid rgba(52,211,153,.2)',fontSize:9}}>ACTIVE</span>
            </div>
          ))}
        </div>
      </div>

      {/* Activity Log */}
      {logs.length>0&&(
        <div className="card" style={{padding:16}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <p style={{fontSize:11,fontWeight:800,color:'var(--muted)',letterSpacing:'.08em'}}>📋 ACTIVITY LOG</p>
            <button className="btn btn-ghost" style={{padding:'4px 10px',fontSize:11}} onClick={()=>setLogs([])}>Clear</button>
          </div>
          <div ref={logsRef} style={{maxHeight:320,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
            {logs.map((l,i)=>(
              <div key={i} style={{display:'flex',gap:10,padding:'6px 10px',borderRadius:8,background:'var(--surface2)',alignItems:'flex-start'}}>
                <span style={{color:'var(--dim)',flexShrink:0,fontFamily:'DM Mono,monospace',fontSize:10,marginTop:1}}>{l.time}</span>
                <span style={{fontSize:12,color:'var(--text)',lineHeight:1.5,wordBreak:'break-word'}}>{l.msg}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* GitHub Actions Guide */}
      <div className="card" style={{padding:20,marginTop:16}}>
        <p style={{fontSize:11,fontWeight:800,color:'var(--muted)',letterSpacing:'.08em',marginBottom:14}}>⚡ GITHUB ACTIONS AUTO-SCHEDULE</p>
        <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.7,marginBottom:12}}>
          To run this bot automatically every hour (FREE), create <code style={{background:'var(--surface2)',padding:'1px 5px',borderRadius:4,fontSize:11}}>.github/workflows/bot.yml</code> in your repo:
        </p>
        <div style={{background:'var(--surface2)',borderRadius:10,padding:14,border:'1px solid var(--border)',fontFamily:'DM Mono,monospace',fontSize:11,color:'#a78bfa',lineHeight:1.8,overflowX:'auto',whiteSpace:'pre'}}>
{`name: AI News Bot
on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: {python-version: '3.11'}
      - run: pip install firebase-admin google-generativeai requests
      - run: python scripts/bot.py
        env:
          GEMINI_API_KEY: \${{ secrets.GEMINI_API_KEY }}
          FIREBASE_CONFIG: \${{ secrets.FIREBASE_CONFIG }}`}
        </div>
        <p style={{fontSize:11,color:'var(--dim)',marginTop:10}}>Save GEMINI_API_KEY &amp; FIREBASE_CONFIG in GitHub → Settings → Secrets and Variables → Actions</p>
      </div>
    </div>
  );
};

// ── PAGES CONFIG ──────────────────────────────────────────────

  {id:'dashboard',label:'Home',icon:'grid'},

];

// ── ADMIN LAYOUT ──────────────────────────────────────────────
const Layout = ({user,onLogout}) => {
  const [page,setPage] = useState('dashboard');
  const toast = useToast();
  const pg = PAGES.find(p=>p.id===page)||PAGES[0];

  // Bottom nav pages (5 visible, rest in settings)
  const bottomPages = PAGES.slice(0,5);

  const renderPage = () => {
    const p={toast};
    switch(page){
      case 'dashboard': return <Dashboard/>;
      case 'ai': return <AIBotPage {...p}/>;
      case 'news': return <NewsManager {...p}/>;
      case 'ads': return <AdsManager {...p}/>;
      case 'comments': return <CommentsManager {...p}/>;
      case 'users': return <UsersManager {...p}/>;
      case 'notifications': return <PushNotifs {...p}/>;
      case 'settings': return <SettingsPage user={user} {...p}/>;
      default: return <Dashboard/>;

  return (
    <div>
      {/* Desktop Sidebar */}
      <aside className="sidebar">
        <div style={{padding:'18px 16px 14px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>

            </div>
            <div>
              <p style={{fontFamily:'Outfit',fontWeight:800,fontSize:14,lineHeight:1}}>KWT News</p>
              <p style={{fontSize:10,color:'var(--dim)',marginTop:2}}>Admin Panel</p>
            </div>
          </div>
        </div>
        <nav style={{padding:'10px 8px',flex:1,overflowY:'auto'}}>
          {PAGES.map(p=>(
            <button key={p.id} className={`nav-btn ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
              <Ic n={p.icon} s={15}/>
              {p.label}
              {page===p.id&&<div style={{marginLeft:'auto',width:5,height:5,borderRadius:'50%',background:'var(--accent)'}}></div>}
            </button>
          ))}
        </nav>
        <div style={{padding:'10px 8px',borderTop:'1px solid var(--border)',flexShrink:0}}>
          <div style={{padding:'10px 12px',borderRadius:10,display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
            <img src={user.photoURL||`https://ui-avatars.com/api/?name=A&background=F5A623&color=050c18`} style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',border:'1.5px solid var(--border2)',flexShrink:0}}/>
            <div style={{minWidth:0,flex:1}}>
              <p style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.displayName||'Admin'}</p>
              <p style={{fontSize:10,color:'var(--dim)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</p>
            </div>
          </div>
          <button className="nav-btn" style={{color:'var(--danger)'}} onClick={onLogout}>
            <Ic n="out" s={14} c="var(--danger)"/> Sign Out
          </button>
        </div>
      </aside>

      {/* Main content */}
      <div className="main-wrap">
        {/* Top bar */}
        <div style={{position:'sticky',top:0,background:'rgba(5,12,24,.92)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:'1px solid var(--border)',padding:'0 16px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',zIndex:30,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {/* Mobile logo */}
            <div style={{display:'flex',alignItems:'center',gap:8}} className="mobile-logo">
              <div style={{width:28,height:28,borderRadius:8,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontFamily:'Outfit',fontWeight:900,fontSize:10,color:'#050c18'}}>K</span>
              </div>
              <span style={{fontFamily:'Outfit',fontWeight:700,fontSize:15}}>{pg.label}</span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:999,background:'rgba(52,211,153,.07)',border:'1px solid rgba(52,211,153,.18)'}}>
              <div className="pulse" style={{width:5,height:5,borderRadius:'50%',background:'var(--success)'}}></div>
              <span style={{fontSize:10,color:'var(--success)',fontWeight:700,letterSpacing:'.04em'}}>LIVE</span>
            </div>
            {/* Mobile logout */}
            <button className="btn btn-ghost" style={{padding:'7px 10px',fontSize:12,display:'none'}} onClick={onLogout} id="mob-logout">
              <Ic n="out" s={14}/>

          </div>

              <div className="dot"></div>

          ))}

      <toast.Toast/>

// ── ROOT APP ──────────────────────────────────────────────────
const App = () => {
  const [user,setUser] = useState(null);
  const [checking,setChecking] = useState(true);

  useEffect(()=>{
    const u=auth.onAuthStateChanged(u=>{
      setUser(u||null); setChecking(false);
    });
    return ()=>u();
  },[]);

  const logout=()=>{ auth.signOut(); setUser(null); };

  if(checking) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{width:48,height:48,borderRadius:14,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 32px rgba(245,166,35,.3)'}}>
        <span style={{fontFamily:'Outfit',fontWeight:900,fontSize:13,color:'#050c18'}}>KWT</span>
      </div>
      <div className="spinner"></div>
    </div>
  );

  if(!user) return <Login onLogin={setUser}/>;
  return <Layout user={user} onLogout={logout}/>;
};

createRoot(document.getElementById('root')).render(<App/>);
</script>
