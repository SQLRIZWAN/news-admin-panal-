on:
  schedule:
    - cron: '0 */2 * * *'   # Har 2 ghante mein auto-run
  workflow_dispatch:          # Manual trigger bhi ho sakta hai

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 馃摜 Checkout Repository
        uses: actions/checkout@v3

      - name: 馃悕 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 馃摝 Install Dependencies
        run: |
          pip install firebase-admin google-generativeai requests

      - name: 馃 Run AI News Bot
        run: python scripts/bot.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
